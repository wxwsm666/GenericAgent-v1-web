<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenericAgent Web UI</title>
<style>
/* ══════════════════════════════════════════════════════════════
   GenericAgent v{{ version }} — Glass Morphism Luxury UI
   ══════════════════════════════════════════════════════════════ */

/* ── CSS Variables ── */
:root {
  --r: 16px; --r-sm: 10px; --r-lg: 24px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --transition-spring: 0.35s cubic-bezier(0.34,1.56,0.64,1);
  --font-stack: 'Inter','SF Pro Rounded','PingFang SC','Microsoft YaHei',system-ui,-apple-system,sans-serif;
  --font-mono: 'SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace;
}

/* Dark theme (default) */
[data-theme="dark"],html:not([data-theme]) {
  --bg-deep: #08080f;
  --bg-surface: #0d0d18;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-bg-strong: rgba(255,255,255,0.09);
  --glass-bg-light: rgba(255,255,255,0.03);
  --glass-bg-modal: rgba(18,18,30,0.95);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-strong: rgba(255,255,255,0.14);
  --glass-highlight: rgba(255,255,255,0.06);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset;
  --glass-shadow-lg: 0 16px 48px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.06) inset;
  --surface: rgba(8,8,15,0.95);
  --surface2: rgba(13,13,24,0.9);
  --text: #e8e8ed; --text2: #9898a8; --text3: #5a5a6e;
  --accent: #7c6ff7; --accent2: #6c5ce7; --accent-glow: rgba(124,111,247,0.25);
  --accent-gradient: linear-gradient(135deg,#6c5ce7,#a78bfa);
  --green: #4ade80; --red: #f87171; --orange: #fbbf24;
  --scrollbar-thumb: rgba(255,255,255,0.08);
  --input-bg: rgba(255,255,255,0.05);
  --hover-bg: rgba(255,255,255,0.05);
  --active-bg: rgba(124,111,247,0.12);
  --msg-user-bg: rgba(124,111,247,0.35);
  --msg-user-border: rgba(124,111,247,0.50);
  --msg-assistant-bg: rgba(255,255,255,0.08);
  --msg-assistant-border: rgba(255,255,255,0.14);
  --blur-amount: 40px;
}

/* Light theme */
[data-theme="light"] {
  --bg-deep: #e8e8f0;
  --bg-surface: #f0f0f5;
  --glass-bg: rgba(255,255,255,0.65);
  --glass-bg-strong: rgba(255,255,255,0.82);
  --glass-bg-light: rgba(255,255,255,0.5);
  --glass-bg-modal: rgba(255,255,255,0.9);
  --glass-border: rgba(0,0,0,0.07);
  --glass-border-strong: rgba(0,0,0,0.12);
  --glass-highlight: rgba(255,255,255,0.9);
  --glass-shadow: 0 4px 24px rgba(0,0,0,0.06),0 1px 0 rgba(255,255,255,0.8) inset;
  --glass-shadow-lg: 0 12px 48px rgba(0,0,0,0.1),0 1px 0 rgba(255,255,255,0.9) inset;
  --surface: rgba(240,240,245,0.9);
  --surface2: rgba(255,255,255,0.75);
  --text: #1a1a2e; --text2: #5a5a7a; --text3: #9a9ab0;
  --accent: #6c5ce7; --accent2: #5a4bd1; --accent-glow: rgba(108,92,231,0.18);
  --accent-gradient: linear-gradient(135deg,#6c5ce7,#a78bfa);
  --green: #16a34a; --red: #dc2626; --orange: #d97706;
  --scrollbar-thumb: rgba(0,0,0,0.1);
  --input-bg: rgba(0,0,0,0.03);
  --hover-bg: rgba(0,0,0,0.04);
  --active-bg: rgba(108,92,231,0.08);
  --msg-user-bg: rgba(108,92,231,0.25);
  --msg-user-border: rgba(108,92,231,0.35);
  --msg-assistant-bg: rgba(0,0,0,0.05);
  --msg-assistant-border: rgba(0,0,0,0.12);
  --blur-amount: 32px;
}

/* ── Reset & Base ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-stack);
  font-size:calc(14px * var(--font-scale,1));
  color:var(--text);
  display:flex;
  background:var(--bg-deep);
  -webkit-font-smoothing:antialiased;
  letter-spacing:0.01em;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse at 20% 10%,var(--accent-glow) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 90%,rgba(167,139,250,0.06) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 50%,var(--glass-bg-light) 0%,transparent 70%),
    linear-gradient(180deg,var(--bg-deep) 0%,var(--bg-surface) 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;opacity:.35;pointer-events:none;
  background-image:
    linear-gradient(var(--glass-border) 1px,transparent 1px),
    linear-gradient(90deg,var(--glass-border) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--glass-border-strong)}

/* ═══════════════ SIDEBAR ═══════════════ */
.sb{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--glass-bg-strong);
  backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  border-right:1px solid var(--glass-border);
  z-index:20;transition:width var(--transition);
  box-shadow:var(--glass-shadow);
}
.sb-logo{
  padding:20px 22px;font-size:17px;font-weight:700;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  border-bottom:1px solid var(--glass-border);
  letter-spacing:-0.02em;
  background:var(--glass-bg-light);
}
.sb-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--green);transition:all .3s;box-shadow:0 0 10px var(--green)}
.sb-logo .dot.running{background:var(--orange);box-shadow:0 0 10px var(--orange)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-nav .sec{
  padding:10px 22px 4px;font-size:10px;text-transform:uppercase;
  letter-spacing:.14em;color:var(--text3);font-weight:700;
}
.sb-item{
  padding:9px 20px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;gap:10px;color:var(--text2);
  transition:all var(--transition);user-select:none;
  border-radius:10px;margin:2px 10px;position:relative;overflow:hidden;
}
.sb-item:hover{background:var(--hover-bg);color:var(--text)}
.sb-item.active{
  background:var(--active-bg);color:var(--accent);font-weight:600;
  box-shadow:inset 0 0 0 1px rgba(124,111,247,0.15);
}
.sb-item .icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.sb-item .badge{
  font-size:10px;padding:2px 8px;border-radius:10px;
  background:linear-gradient(135deg,rgba(124,111,247,0.2),rgba(167,139,250,0.15));
  color:var(--accent);margin-left:auto;font-weight:600;
}
.sb-foot{
  padding:10px 20px;border-top:1px solid var(--glass-border);
  font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;
}

/* Sidebar Collapse */
.sb.collapsed{width:60px}
.sb.collapsed .sb-logo{padding:20px 12px;font-size:0;justify-content:center}
.sb.collapsed .sb-logo .dot{margin:0}
.sb.collapsed .sb-item{padding:9px 12px;justify-content:center;font-size:0;margin:2px 6px;border-radius:10px}
.sb.collapsed .sb-item .icon{font-size:18px;width:auto}
.sb.collapsed .sb-item .badge{display:none}
.sb.collapsed .sb-nav .sec{display:none}
.sb.collapsed .sb-foot{padding:10px 4px;justify-content:center;font-size:0}
.sb.collapsed .sb-sub-items{display:none}
.sb.collapsed .sb-sub-toggle{display:none}
.sb-toggle{
  padding:10px 0;text-align:center;cursor:pointer;
  color:var(--text3);font-size:13px;user-select:none;
  border-top:1px solid var(--glass-border);
  transition:color var(--transition);
}
.sb-toggle:hover{color:var(--accent)}

/* Sub-menu */
.sb-sub-group{margin-bottom:2px}
.sb-sub-toggle{
  padding:6px 20px;font-size:10px;text-transform:uppercase;
  letter-spacing:.14em;color:var(--text3);font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  user-select:none;
}
.sb-sub-toggle .arrow{font-size:8px;transition:transform var(--transition);display:inline-block}
.sb-sub-toggle.collapsed .arrow{transform:rotate(-90deg)}
.sb-sub-items{overflow:hidden}
.sb-sub-items.collapsed{display:none}

/* Dev-only sidebar items */
.sb-item.dev-only{display:none}
body.dev-mode .sb-item.dev-only{display:flex}
.sb.collapsed .sb-item.dev-only{display:none}

/* Developer mode toggle in sidebar */
.sb-dev-toggle{
  display:flex;align-items:center;gap:8px;padding:8px 20px;
  cursor:pointer;user-select:none;font-size:11px;color:var(--text3);
  border-top:1px solid var(--glass-border);
  transition:all var(--transition);
}
.sb-dev-toggle:hover{color:var(--accent)}
.sb-dev-toggle .dev-sw{
  width:32px;height:18px;border-radius:9px;background:var(--glass-border-strong);
  position:relative;transition:background var(--transition);flex-shrink:0;
}
.sb-dev-toggle .dev-sw::after{
  content:'';position:absolute;width:14px;height:14px;border-radius:50%;
  background:var(--text2);top:2px;left:2px;transition:all var(--transition);
}
body.dev-mode .sb-dev-toggle .dev-sw{background:var(--accent)}
body.dev-mode .sb-dev-toggle .dev-sw::after{background:#fff;left:16px}
.sb.collapsed .sb-dev-toggle{padding:8px 4px;justify-content:center;font-size:0}

/* Font Size */
html.font-s{--font-scale:0.85}
html.font-m{--font-scale:1}
html.font-l{--font-scale:1.15}
html.font-xl{--font-scale:1.3}

/* ═══════════════ MAIN ═══════════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* Topbar */
.topbar{
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  background:var(--glass-bg-strong);
  backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  border-bottom:1px solid var(--glass-border);
  z-index:10;
  box-shadow:0 1px 0 var(--glass-highlight),0 4px 20px rgba(0,0,0,0.1);
}
.topbar .title{font-size:17px;font-weight:700;letter-spacing:-0.02em}
.topbar .actions{display:flex;gap:8px;align-items:center}
.topbar .badge{
  font-size:12px;padding:5px 14px;border-radius:20px;
  background:var(--glass-bg-strong);color:var(--text2);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}

/* Content */
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content.chat-mode{padding:0;display:flex;flex-direction:column;overflow:hidden}

/* ═══════════════ GLASS CARD ═══════════════ */
.card{
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  border:1px solid var(--glass-border);
  border-radius:var(--r-lg);padding:22px;margin-bottom:16px;
  box-shadow:var(--glass-shadow);
  transition:all var(--transition);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,var(--glass-highlight),transparent);
  opacity:1;transition:opacity var(--transition);
}
.card:hover::before{opacity:.7}
.card:hover{border-color:var(--glass-border-strong);transform:translateY(-2px);box-shadow:var(--glass-shadow-lg)}
.card h3{font-size:15px;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:-0.01em}
.card p{color:var(--text2);font-size:13px;line-height:1.6}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{
  padding:9px 18px;border:1px solid var(--glass-border-strong);
  background:var(--glass-bg-light);color:var(--text);
  border-radius:12px;cursor:pointer;font-size:13px;
  transition:all var(--transition);display:inline-flex;align-items:center;gap:6px;
  white-space:nowrap;font-family:inherit;font-weight:500;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;overflow:hidden;letter-spacing:0.01em;
}
.btn:hover{background:var(--hover-bg);border-color:var(--glass-border-strong);transform:translateY(-1px)}
.btn:active{transform:scale(0.97)}
.btn.acc{
  border-color:rgba(124,111,247,0.3);color:var(--accent);
  background:rgba(124,111,247,0.08);
}
.btn.acc:hover{
  background:var(--accent-gradient);color:#fff;border-color:transparent;
  box-shadow:0 4px 20px var(--accent-glow);
}
.btn.red{border-color:rgba(248,113,113,0.3);color:var(--red);background:rgba(248,113,113,0.06)}
.btn.red:hover{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 4px 20px rgba(248,113,113,0.3)}
.btn.grn{border-color:rgba(74,222,128,0.3);color:var(--green);background:rgba(74,222,128,0.06)}
.btn.grn:hover{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 4px 20px rgba(74,222,128,0.3)}
.btn.sm{padding:5px 12px;font-size:11px;border-radius:10px}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--hover-bg);border-color:var(--glass-border)}
.btn:disabled{opacity:.4;pointer-events:none;transform:none!important}

/* Ripple */
.ripple{position:absolute;border-radius:50%;background:var(--accent-glow);transform:scale(0);animation:ripple .6s ease-out;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* ═══════════════ FORMS ═══════════════ */
textarea,input,select{
  background:var(--input-bg);border:1px solid var(--glass-border-strong);
  color:var(--text);padding:10px 16px;border-radius:12px;
  font-family:inherit;font-size:13px;width:100%;outline:none;
  transition:all var(--transition);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
textarea:focus,input:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
textarea{resize:vertical;min-height:80px;line-height:1.55}

/* ═══════════════ TABLE ═══════════════ */
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--glass-border);font-size:13px}
th{color:var(--text3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 14px}
tr:hover td{background:var(--hover-bg)}

/* ═══════════════ GRIDS ═══════════════ */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}

/* ═══════════════ TAGS ═══════════════ */
.tag{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;background:var(--glass-bg-strong);color:var(--text2);margin:2px;font-weight:500}
.tag.on{background:rgba(74,222,128,0.12);color:var(--green)}
.tag.off{background:rgba(248,113,113,0.12);color:var(--red)}
.tag.warn{background:rgba(251,191,36,0.12);color:var(--orange)}

/* ═══════════════ STAT CARDS ═══════════════ */
.stat-card{
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  border:1px solid var(--glass-border);
  border-radius:var(--r-lg);padding:26px;text-align:center;cursor:pointer;
  transition:all var(--transition);
  box-shadow:var(--glass-shadow);
}
.stat-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,0.3),0 0 0 1px var(--accent-glow)}
.stat-card .val{font-size:36px;font-weight:800;margin:12px 0;letter-spacing:-0.03em}
.stat-card .lbl{font-size:12px;color:var(--text2);font-weight:600}

/* ═══════════════ TOGGLE SWITCH ═══════════════ */
.toggle-sw{position:relative;display:inline-block;width:44px;height:26px;cursor:pointer}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-sw .slider{position:absolute;inset:0;background:var(--glass-bg-strong);border-radius:26px;border:1px solid var(--glass-border-strong);transition:.3s}
.toggle-sw .slider:before{content:'';position:absolute;width:20px;height:20px;left:2px;bottom:2px;background:var(--text2);border-radius:50%;transition:.3s}
.toggle-sw input:checked+.slider{background:var(--accent);border-color:var(--accent)}
.toggle-sw input:checked+.slider:before{background:#fff;transform:translateX(18px)}

/* ═══════════════ CODE / PRE ═══════════════ */
pre{
  background:rgba(0,0,0,0.2);border:1px solid var(--glass-border);
  border-radius:12px;padding:16px;overflow-x:auto;
  font-size:12px;line-height:1.6;font-family:var(--font-mono);
  color:var(--text2);
}
code{font-family:var(--font-mono);font-size:12px;background:rgba(124,111,247,0.08);padding:2px 6px;border-radius:5px;color:var(--accent)}

/* ═══════════════ EMPTY STATE ═══════════════ */
.empty{text-align:center;padding:72px 20px;color:var(--text2)}
.empty .icon{font-size:52px;margin-bottom:16px;opacity:.6}
.empty h3{font-size:16px;color:var(--text);margin-bottom:6px;font-weight:600}
.empty p{font-size:13px;color:var(--text3)}

/* ═══════════════ UTILITY ═══════════════ */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mb{margin-bottom:14px}.mt{margin-top:14px}

/* ═══════════════ CHAT ═══════════════ */
.session-tabs{
  display:flex;align-items:center;gap:4px;padding:8px 16px 0;
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  border-bottom:1px solid var(--glass-border);
  overflow-x:auto;flex-shrink:0;
}
.session-tab{
  padding:10px 18px;font-size:13px;cursor:pointer;
  border-radius:14px 14px 0 0;display:flex;align-items:center;gap:8px;
  color:var(--text2);white-space:nowrap;transition:all var(--transition);
  border:1.5px solid transparent;border-bottom:none;user-select:none;
  position:relative;font-weight:500;
}
.session-tab::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:3px;background:var(--accent);border-radius:3px 3px 0 0;
  transition:width var(--transition);
}
.session-tab:hover{color:var(--text);background:var(--hover-bg)}
.session-tab:hover::after{width:40%}
.session-tab.active{
  color:var(--accent);font-weight:700;
  background:var(--glass-bg-strong);
  border-color:var(--glass-border);
  backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.session-tab.active::after{width:60%}
.session-tab .tab-icon{font-size:16px;line-height:1}
.session-tab .close{
  width:22px;height:22px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:12px;
  opacity:.35;transition:all var(--transition);margin-left:2px;
  color:var(--text2);flex-shrink:0;
}
.session-tab:hover .close{opacity:.7}
.session-tab .close:hover{opacity:1;background:var(--red);color:#fff;transform:scale(1.1)}
.session-tab-add{
  padding:10px 14px;font-size:20px;cursor:pointer;color:var(--text3);
  border-radius:14px;transition:all var(--transition);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  line-height:1;font-weight:300;
}
.session-tab-add:hover{color:var(--accent);background:var(--hover-bg);transform:scale(1.05)}

/* Chat Area */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.msgs{flex:1;overflow-y:auto;padding:24px 28px}
.msg{margin-bottom:20px;display:flex;gap:12px;max-width:85%;animation:fadeIn .3s ease-out}
.msg.user{margin-left:auto;flex-direction:row-reverse}
.msg .av{
  width:34px;height:34px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:15px;flex-shrink:0;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.msg.user .av{background:var(--accent-gradient);color:#fff;box-shadow:0 4px 12px var(--accent-glow)}
.msg.assistant .av{background:var(--glass-bg-strong);border:1px solid var(--glass-border)}
.msg .bub{
  padding:12px 18px;border-radius:var(--r);font-size:13px;line-height:1.65;
  white-space:pre-wrap;word-break:break-word;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.msg.user .bub{background:var(--msg-user-bg);border:1px solid var(--msg-user-border);border-radius:var(--r) 4px var(--r) var(--r)}
.msg.assistant .bub{background:var(--msg-assistant-bg);border:1px solid var(--msg-assistant-border);border-radius:4px var(--r) var(--r) var(--r)}
.msg .ts{font-size:11px;color:var(--text3);margin-top:4px}

/* Quote / Reply */
.msg-body{position:relative}
.msg .quote-btn{display:none;position:absolute;right:6px;bottom:4px;font-size:11px;cursor:pointer;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:6px;padding:2px 6px;color:var(--text2);transition:all .15s}
.msg:hover .quote-btn{display:inline-block}
.msg .quote-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.quote-card{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:0 10px 6px;background:var(--glass-bg-strong);border:1px solid var(--accent);border-radius:10px;font-size:12px}
.quote-card .qc-role{font-weight:600;color:var(--accent);white-space:nowrap}
.quote-card .qc-text{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.quote-card .qc-close{cursor:pointer;color:var(--text3);font-size:16px;line-height:1}
.quote-card .qc-close:hover{color:var(--red)}

/* Chat Input */
.chat-input{
  padding:16px 24px;
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  border-top:1px solid var(--glass-border);
}
.chat-input .row{display:flex;gap:10px;align-items:flex-end}
.chat-input textarea{
  flex:1;resize:none;min-height:48px;max-height:180px;
  border-radius:14px;padding:14px 18px;font-size:14px;
  background:var(--input-bg);line-height:1.5;
}
.chat-input .send{
  min-width:48px;width:48px;height:48px;border-radius:14px;border:none;
  background:var(--accent-gradient);color:#fff;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all var(--transition);box-shadow:0 4px 16px var(--accent-glow);
}
.chat-input .send:hover{transform:scale(1.04);box-shadow:0 6px 24px var(--accent-glow)}
.chat-input .send:disabled{opacity:.35;box-shadow:none;transform:none}
.chat-toolbar{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;font-size:11px;color:var(--text3);
}
.chat-toolbar .left,.chat-toolbar .right{display:flex;gap:6px;align-items:center}

/* File chips */
.file-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.file-chip{
  display:flex;align-items:center;gap:6px;padding:6px 12px;position:relative;
  border-radius:10px;font-size:11px;
  background:var(--glass-bg-strong);border:1px solid var(--glass-border);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.file-chip img{width:28px;height:28px;border-radius:6px;object-fit:cover}
.file-chip .remove{cursor:pointer;opacity:.5;font-size:15px;transition:all var(--transition)}
.file-chip .remove:hover{opacity:1;color:var(--red)}
.file-chip .ocr-btn{cursor:pointer;opacity:.5;font-size:13px;transition:all var(--transition);margin-left:auto}
.file-chip .ocr-btn:hover{opacity:1;color:var(--accent)}
.ocr-result{position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:4px;
  background:var(--glass-bg-strong);border:1px solid var(--glass-border);border-radius:10px;
  padding:10px;font-size:12px;max-height:200px;overflow-y:auto;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.3)}
.ocr-text{white-space:pre-wrap;line-height:1.5;margin-bottom:8px;color:var(--text1)}
.ocr-actions{display:flex;gap:6px}
.ocr-actions button{padding:3px 10px;border-radius:6px;font-size:11px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--text2);cursor:pointer;transition:all var(--transition)}
.ocr-actions button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Drag overlay */
.drag-overlay{
  display:none;position:absolute;inset:0;z-index:50;
  background:rgba(124,111,247,0.06);border:3px dashed var(--accent);
  border-radius:var(--r-lg);margin:16px;
  align-items:center;justify-content:center;font-size:18px;
  color:var(--accent);font-weight:700;pointer-events:none;
}
.drag-overlay.show{display:flex}

/* Thinking dots */
.think{display:flex;align-items:center;gap:10px;color:var(--text2);padding:10px 0;font-size:13px}
.think .d span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite;margin:0 3px}
.think .d span:nth-child(2){animation-delay:.2s}.think .d span:nth-child(3){animation-delay:.4s}

/* Tool execution cards (ChatGPT-style) */
.tool-card{margin:6px 0;border:1px solid var(--glass-border);border-radius:10px;overflow:hidden;font-size:13px;background:var(--glass-bg);transition:all .2s}
.tool-card-header{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;color:var(--text)}
.tool-card-header:hover{background:var(--glass-bg-strong)}
.tool-card-icon{font-size:14px;flex-shrink:0}
.tool-card-name{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-card-status{font-size:11px;color:var(--text3);flex-shrink:0}
.tool-card.running .tool-card-status{color:var(--accent)}
.tool-card.done .tool-card-status{color:var(--green)}
.tool-card-body{display:none;padding:0 12px 10px;font-size:12px;color:var(--text2);border-top:1px solid var(--glass-border);max-height:200px;overflow-y:auto}
.tool-card.expanded .tool-card-body{display:block}
.tool-card-body .tc-section{margin-top:6px}
.tool-card-body .tc-label{font-weight:600;margin-bottom:2px;color:var(--text)}
.tool-card-body pre{background:var(--bg);padding:6px 8px;border-radius:6px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto}
.tool-card-arrow{font-size:10px;transition:transform .2s;flex-shrink:0;color:var(--text3)}
.tool-card.expanded .tool-card-arrow{transform:rotate(90deg)}
.tool-spinner{width:12px;height:12px;border:2px solid var(--glass-border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}


/* ═══════════════ GROUP CHAT (WeChat-style) ═══════════════ */
.gc-chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gc-output{flex:1;overflow-y:auto;padding:16px 20px}
.gc-input-bar{
  flex-shrink:0;
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(200%);
  border-top:1px solid var(--glass-border);
  padding:8px 16px 12px;
}
.gc-agents-row{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:4px 0 6px;flex-wrap:wrap}
.gc-agent-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--glass-bg-light);border:1px solid var(--glass-border);
  border-radius:20px;padding:3px 10px 3px 4px;font-size:11px;
  color:var(--text2);cursor:pointer;transition:all var(--transition);
  white-space:nowrap;user-select:none;
}
.gc-agent-chip:hover{border-color:var(--accent);color:var(--text)}
.gc-agent-add{padding:3px 10px;font-size:13px}
.gc-chip-avatar{
  width:20px;height:20px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;
}
.gc-msg{margin-bottom:14px;padding:14px 18px;border-radius:var(--r);border:1px solid var(--glass-border);background:var(--glass-bg-light);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.gc-msg .gc-agent{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.gc-msg .gc-avatar{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.gc-files{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--glass-border)}
.gc-file-img{cursor:pointer;border-radius:8px;overflow:hidden;max-width:180px;border:1px solid var(--glass-border)}
.gc-file-img img{width:100%;max-height:120px;object-fit:cover;display:block}
.gc-file-img span{display:block;font-size:10px;color:var(--text3);padding:3px 6px;background:var(--glass-bg);text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.gc-file-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:var(--glass-bg);border:1px solid var(--glass-border);font-size:11px}

/* ═══════════════ RIGHT HISTORY PANEL ═══════════════ */
.rp{
  width:0;overflow:hidden;flex-shrink:0;
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  border-left:1px solid var(--glass-border);
  transition:width var(--transition);
  display:flex;flex-direction:column;z-index:15;
}
.rp.open{width:290px}
.rp-header{
  padding:16px 18px;border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.rp-header h4{font-size:13px;font-weight:700;margin:0;letter-spacing:-0.01em}
.rp-search{padding:10px 18px;flex-shrink:0}
.rp-search input{
  width:100%;padding:9px 12px;border-radius:10px;font-size:12px;
  background:var(--input-bg);border:1px solid var(--glass-border-strong);
  color:var(--text);outline:none;
}
.rp-search input:focus{border-color:var(--accent)}
.rp-list{flex:1;overflow-y:auto;padding:8px 0}
.rp-item{
  padding:12px 18px;cursor:pointer;border-bottom:1px solid var(--glass-border);
  transition:all var(--transition);font-size:12px;
}
.rp-item:hover{background:var(--hover-bg)}
.rp-item.active{background:var(--active-bg);border-left:3px solid var(--accent)}
.rp-item .rp-name{font-weight:600;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px}
.rp-item .rp-meta{font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
.rp-item .rp-actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity var(--transition)}
.rp-item:hover .rp-actions{opacity:1}
.rp-toggle{
  display:none;position:fixed;right:0;top:50%;transform:translateY(-50%);
  width:24px;height:72px;border-radius:14px 0 0 14px;
  background:var(--glass-bg-strong);border:1px solid var(--glass-border);
  border-right:none;cursor:pointer;z-index:16;
  font-size:11px;color:var(--text3);transition:all var(--transition);
  backdrop-filter:blur(var(--blur-amount)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur-amount)) saturate(180%);
}
.rp-toggle:hover{color:var(--accent);border-color:var(--glass-border-strong)}

/* ═══════════════ MODAL ═══════════════ */
.modal-bg{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--glass-bg-modal);
  backdrop-filter:blur(calc(var(--blur-amount) + 12px)) saturate(200%);
  -webkit-backdrop-filter:blur(calc(var(--blur-amount) + 12px)) saturate(200%);
  border:1px solid var(--glass-border-strong);
  border-radius:var(--r-lg);padding:28px;max-width:600px;width:90%;
  max-height:82vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.45);
  animation:modalIn .3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(16px)}to{opacity:1;transform:none}}
.modal h3{margin-bottom:18px;font-size:17px;font-weight:700;letter-spacing:-0.01em}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ═══════════════ TOAST ═══════════════ */
.toast{
  position:fixed;top:20px;right:20px;z-index:200;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast-item{
  padding:14px 20px;border-radius:14px;font-size:13px;font-weight:500;
  background:var(--glass-bg-strong);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-border-strong);
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
  animation:slideIn .3s cubic-bezier(0.34,1.56,0.64,1);
  max-width:400px;pointer-events:auto;
}

/* ═══════════════ THEME TOGGLE ═══════════════ */
.theme-btn{
  width:36px;height:36px;border-radius:12px;border:1px solid var(--glass-border-strong);
  background:var(--glass-bg-light);color:var(--text);cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.theme-btn:hover{background:var(--hover-bg);transform:scale(1.05)}

/* ═══════════════ BACKUP SECTION ═══════════════ */
.backup-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:768px){
  .sb{display:none}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .agent-cards{grid-template-columns:1fr}
}

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}

/* ═══════════════ ROUND FOLD ═══════════════ */
.round-fold{margin-bottom:4px;border-radius:var(--r);overflow:hidden;border:1px solid var(--glass-border);transition:all var(--transition)}
.round-fold:hover{border-color:var(--glass-border-strong)}
.round-fold-header{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--glass-bg-light);cursor:pointer;user-select:none;
  transition:background var(--transition);
}
.round-fold-header:hover{background:var(--hover-bg)}
.round-fold-arrow{
  font-size:10px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;
}
.round-fold.open .round-fold-arrow{transform:rotate(90deg)}
.round-fold-preview{
  flex:1;min-width:0;font-size:12px;color:var(--text2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.round-fold-meta{
  font-size:10px;color:var(--text3);flex-shrink:0;
}
.round-fold-body{
  display:none;padding:0 14px 10px;
}
.round-fold.open .round-fold-body{display:block}
.round-fold-body .msg{border:none;border-radius:0;padding:8px 0;margin:0;animation:none}
.round-fold-body .msg+.msg{border-top:1px solid var(--glass-border)}

.fold-all-bar{
  display:flex;gap:8px;padding:6px 0;margin-bottom:8px;
  border-bottom:1px solid var(--glass-border);
}
.fold-all-bar button{
  font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--glass-border);
  background:var(--glass-bg-light);color:var(--text2);cursor:pointer;
  transition:all var(--transition);
}
.fold-all-bar button:hover{color:var(--text);border-color:var(--glass-border-strong)}

/* ═══════════════ SPLIT PANE ═══════════════ */
/* Multi-pane grid layouts */
.chat-layout-bar{
  display:flex;align-items:center;gap:4px;padding:4px 12px;
  background:var(--glass-bg);border-bottom:1px solid var(--glass-border);
  flex-shrink:0;
}
.chat-grid{flex:1;display:grid;gap:0;overflow:hidden}
.chat-grid-single{display:flex;flex-direction:column;overflow:hidden}
.chat-grid-single>.chat-pane{flex:1;min-height:0}
.chat-grid-2h{grid-template-columns:1fr 1fr}
.chat-grid-2v{grid-template-rows:1fr 1fr}
.chat-grid-3h{grid-template-columns:1fr 1fr 1fr}
.chat-grid-2x2{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.chat-grid .chat-pane{
  display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0;
  border-right:1px solid var(--glass-border);
  border-bottom:1px solid var(--glass-border);
}
.chat-pane .chat-input{border-top:1px solid var(--glass-border);flex-shrink:0;padding:8px 10px}
.chat-pane .chat-input .row{gap:6px}
.chat-split .msgs{flex:1;overflow-y:auto}
.chat-split .chat-input{border-top:1px solid var(--glass-border);padding:8px 12px;flex-shrink:0}
.chat-split .chat-input textarea{font-size:13px}
.chat-split .chat-toolbar{padding:4px 0;font-size:10px}
.chat-split .chat-toolbar span{font-size:10px}
@media(max-width:900px){.chat-split{flex-direction:column!important}.chat-split .chat-pane+.chat-pane{border-left:none;border-top:2px solid var(--glass-border-strong)}}

/* ═══════════════ PANE HEADER ═══════════════ */
.chat-pane-header{
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  background:var(--glass-bg-strong);border-bottom:1px solid var(--glass-border);
  flex-shrink:0;cursor:default;transition:all var(--transition);
}
.chat-pane-header .pane-icon{font-size:18px;line-height:1}
.chat-pane-header .pane-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-pane-header .pane-badge{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:var(--accent);opacity:.7;
}
.chat-pane-header .pane-actions{display:flex;gap:2px}
.chat-pane-header .pane-actions button{
  width:26px;height:26px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;font-size:13px;color:var(--text3);display:flex;
  align-items:center;justify-content:center;transition:all var(--transition);
}
.chat-pane-header .pane-actions button:hover{background:var(--hover-bg);color:var(--text)}
.chat-pane-header:hover{border-color:var(--accent);background:var(--glass-bg-stronger)}

/* ═══════════════ HISTORY PANEL ═══════════════ */
.history-toggle-bar{
  display:flex;align-items:center;gap:6px;padding:6px 16px;
  background:var(--glass-bg);border-top:1px solid var(--glass-border);
  flex-shrink:0;cursor:pointer;user-select:none;transition:all var(--transition);
  font-size:11px;color:var(--text2);
}
.history-toggle-bar:hover{background:var(--glass-bg-light);color:var(--text)}
.history-toggle-bar .arrow{transition:transform var(--transition);font-size:10px}
.history-toggle-bar.open .arrow{transform:rotate(90deg)}
.history-panel{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
  background:var(--glass-bg);border-top:1px solid transparent;
}
.history-panel.open{max-height:280px;border-top-color:var(--glass-border);overflow-y:auto}
.history-item{
  display:flex;align-items:center;gap:10px;padding:8px 16px;
  cursor:pointer;transition:all var(--transition);
  border-bottom:1px solid var(--glass-border);font-size:12px;
}
.history-item:hover{background:var(--glass-bg-light)}
.history-item .hi-icon{font-size:14px;flex-shrink:0;opacity:.7}
.history-item .hi-preview{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.history-item .hi-time{font-size:10px;color:var(--text3);flex-shrink:0}
.history-empty{text-align:center;padding:20px;color:var(--text3);font-size:12px}

/* Tab highlight flash */
.session-tab.flash-highlight{
  animation:tabFlash .6s ease-out;
  box-shadow:0 0 0 3px var(--accent),0 0 16px var(--accent);
}
@keyframes tabFlash{
  0%{box-shadow:0 0 0 0 var(--accent),0 0 0 var(--accent)}
  50%{box-shadow:0 0 0 6px var(--accent),0 0 20px var(--accent)}
  100%{box-shadow:0 0 0 0 transparent,0 0 0 transparent}
}
.moments-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--glass-border);background:var(--glass-bg-light);backdrop-filter:blur(var(--blur-amount));-webkit-backdrop-filter:blur(var(--blur-amount));position:sticky;top:0;z-index:10}
.moments-header h2{font-size:18px;margin:0;background:linear-gradient(135deg,var(--accent),#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.moments-feed{flex:1;overflow-y:auto;padding:12px 16px}
.moment-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:14px;padding:16px;margin-bottom:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all var(--transition)}
.moment-card:hover{border-color:var(--glass-border-strong);box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.moment-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.moment-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.moment-meta{flex:1}
.moment-name{font-size:14px;font-weight:700}
.moment-time{font-size:11px;color:var(--text3);margin-top:2px}
.moment-content{font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.moment-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:10px}
.moment-images img{width:100%;border-radius:10px;cursor:pointer;max-height:200px;object-fit:cover;transition:transform 0.2s}
.moment-images img:hover{transform:scale(1.02)}
.moment-actions{display:flex;align-items:center;gap:16px;padding-top:8px;border-top:1px solid var(--glass-border);margin-top:8px}
.moment-act-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all 0.2s}
.moment-act-btn:hover{background:var(--glass-bg-light);color:var(--accent)}
.moment-act-btn.liked{color:#ff4757}
.moment-comments{margin-top:10px;padding-top:10px;border-top:1px solid var(--glass-border)}
.moment-cmt{display:flex;gap:8px;padding:6px 0;font-size:12px}
.moment-cmt .cmt-author{font-weight:600;color:var(--accent);flex-shrink:0}
.moment-cmt .cmt-content{color:var(--text2);flex:1;word-break:break-word}
.moment-cmt .cmt-time{font-size:10px;color:var(--text3);flex-shrink:0}
.moment-cmt.agent-reply{background:var(--glass-bg-light);padding:6px 10px;border-radius:8px;margin:4px 0}
.moment-cmt-input{display:flex;gap:8px;margin-top:8px}
.moment-cmt-input input{flex:1;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--text)}
.moment-cmt-input button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer}
.moment-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.moment-empty .icon{font-size:48px;margin-bottom:12px}

/* ── Desktop Pet ── */
#deskPet{position:fixed;z-index:9999;cursor:grab;user-select:none;transition:filter .3s;--pet-bg:#667eea;--pet-bg2:#764ba2;--pet-eye:#1a1a2e;--pet-cheek:rgba(255,150,150,.4);--pet-mouth:rgba(26,26,46,.5);--pet-glow:rgba(102,126,234,.35);--pet-face-r:50%}
#deskPet:active{cursor:grabbing}
#deskPet.dragging{cursor:grabbing;filter:brightness(1.1)}
.pet-body{width:72px;height:72px;position:relative;animation:petFloat 3s ease-in-out infinite}
.pet-face{width:72px;height:62px;background:linear-gradient(135deg,var(--pet-bg) 0%,var(--pet-bg2) 100%);border-radius:var(--pet-face-r);position:relative;box-shadow:0 8px 24px var(--pet-glow),inset 0 -8px 16px rgba(0,0,0,.1),inset 0 4px 12px rgba(255,255,255,.2);overflow:hidden}
.pet-eyes{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:14px}
.pet-eye{width:9px;height:11px;background:var(--pet-eye);border-radius:50%;animation:petBlink 4s infinite}
.pet-eye:nth-child(2){animation-delay:.15s}
.pet-mouth{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:12px;height:6px;border-bottom:2.5px solid var(--pet-mouth);border-radius:0 0 50% 50%}
.pet-cheek{position:absolute;top:28px;width:7px;height:5px;background:var(--pet-cheek);border-radius:50%}
.pet-cheek.left{left:8px}.pet-cheek.right{right:8px}
.pet-ears{position:absolute;top:-8px;left:50%;transform:translateX(-50%);display:flex;gap:28px;display:none}
.pet-ear{width:14px;height:20px;background:var(--pet-bg);border-radius:50% 50% 20% 20%}
.pet-ear.right{background:var(--pet-bg2)}
.pet-tail{position:absolute;top:10px;right:-16px;width:18px;height:10px;background:var(--pet-bg2);border-radius:0 50% 50% 0;display:none}
.pet-antler{position:absolute;top:-14px;left:50%;display:none;gap:16px;transform:translateX(-50%)}
.pet-antler span{width:3px;height:16px;background:var(--pet-eye);border-radius:2px}
.pet-antler span:first-child{transform:rotate(-15deg)}.pet-antler span:last-child{transform:rotate(15deg)}
.pet-flower{position:absolute;top:2px;right:8px;font-size:10px;display:none}
.pet-shadow{width:40px;height:8px;background:rgba(0,0,0,.12);border-radius:50%;margin:4px auto 0;animation:petShadow 3s ease-in-out infinite}
.pet-bubble{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;color:#333;padding:6px 12px;border-radius:14px;font-size:12px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.12);opacity:0;pointer-events:none;transition:opacity .25s}
.pet-bubble.show{opacity:1}
.pet-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff}
.pet-status{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text2);white-space:nowrap;opacity:.8;display:none}
.pet-status.show{display:block}
/* thinking */
#deskPet.thinking .pet-face{animation:petThink .6s ease-in-out infinite}
#deskPet.thinking .pet-eyes{animation:petThinkEyes .6s ease-in-out infinite}
/* sleepy */
#deskPet.sleepy .pet-eye{height:3px;border-radius:50%;animation:none}
/* toggle */
.pet-toggle{position:fixed;bottom:16px;right:16px;z-index:9998;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--glass-border);background:var(--glass-bg);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .3s}
.pet-toggle:hover{opacity:1}
/* context menu */
.ctx-item{padding:8px 14px;cursor:pointer;font-size:13px;transition:background .15s}
.ctx-item:hover{background:var(--glass-bg-light)}

/* ── 10 Pet Types ── */
/* 0: 默认 - 蓝色团子 */
.pet-type-0{--pet-bg:#4a90d9;--pet-bg2:#2563eb;--pet-face-r:50% 50% 45% 45%;--pet-glow:rgba(74,144,217,.35)}
/* 1: 猫咪 - 橘色 + 尖耳 */
.pet-type-1{--pet-bg:#f4a460;--pet-bg2:#e8923a;--pet-face-r:46% 46% 48% 48%;--pet-glow:rgba(244,164,96,.35)}
.pet-type-1 .pet-ears{display:flex}.pet-type-1 .pet-ear{clip-path:polygon(50% 0%,0% 100%,100% 100%)}.pet-type-1 .pet-mouth{width:8px}.pet-type-1 .pet-tail{display:block}
/* 2: 小狗 - 棕色 + 垂耳 */
.pet-type-2{--pet-bg:#c89460;--pet-bg2:#a0724a;--pet-face-r:48% 48% 45% 45%;--pet-glow:rgba(200,148,96,.35)}
.pet-type-2 .pet-ears{display:flex;gap:22px;top:-10px}.pet-type-2 .pet-ear{width:16px;height:22px;border-radius:40% 40% 60% 60%}.pet-type-2 .pet-mouth{width:16px;height:8px;border-bottom-width:2px;bottom:10px}
/* 3: 机器人 - 灰银 + 方眼 */
.pet-type-3{--pet-bg:#8899aa;--pet-bg2:#667788;--pet-face-r:20%;--pet-glow:rgba(136,153,170,.25)}
.pet-type-3 .pet-eye{width:8px;height:8px;border-radius:2px;background:#0ff;box-shadow:0 0 6px #0ff}.pet-type-3 .pet-mouth{width:16px;border-bottom-style:dashed}.pet-type-3 .pet-antler{display:flex}
/* 4: 幽灵 - 白色 + 波纹底 */
.pet-type-4{--pet-bg:#e8e8f0;--pet-bg2:#d0d0dc;--pet-face-r:48% 48% 30% 30%;--pet-glow:rgba(200,200,220,.3);--pet-eye:#445;--pet-mouth:rgba(68,68,85,.4)}
.pet-type-4 .pet-face{border-radius:48% 48% 20% 20% / 70% 70% 30% 30%}.pet-type-4 .pet-eye{width:10px;height:12px}.pet-type-4 .pet-cheek{display:none}
/* 5: 狐狸 - 橙红 + 大三角耳 */
.pet-type-5{--pet-bg:#e87830;--pet-bg2:#d06020;--pet-face-r:44% 44% 50% 50%;--pet-glow:rgba(232,120,48,.3);--pet-cheek:rgba(255,200,180,.5)}
.pet-type-5 .pet-ears{display:flex;gap:24px}.pet-type-5 .pet-ear{width:16px;height:24px;clip-path:polygon(50% 0%,0% 100%,100% 100%)}.pet-type-5 .pet-face::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:28px;height:14px;background:rgba(255,255,255,.35);border-radius:50%}
/* 6: 兔子 - 粉白 + 长耳 */
.pet-type-6{--pet-bg:#f8e0e8;--pet-bg2:#f0c8d4;--pet-face-r:50% 50% 45% 45%;--pet-glow:rgba(248,224,232,.4);--pet-eye:#c44;--pet-cheek:rgba(255,180,180,.5)}
.pet-type-6 .pet-ears{display:flex;gap:10px;top:-14px}.pet-type-6 .pet-ear{width:12px;height:32px;border-radius:50%}.pet-type-6 .pet-mouth{width:6px;border-bottom-width:1.5px}
/* 7: 熊猫 - 黑白 + 圆脸 */
.pet-type-7{--pet-bg:#f5f5f5;--pet-bg2:#e8e8e8;--pet-face-r:48% 48% 48% 48%;--pet-glow:rgba(40,40,40,.2);--pet-eye:#222}
.pet-type-7 .pet-face::before{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:36px;height:18px;background:rgba(0,0,0,.85);border-radius:50% 50% 50% 50% / 70% 70% 40% 40%}.pet-type-7 .pet-eye{background:#fff;width:7px;height:7px;z-index:1;position:relative}.pet-type-7 .pet-ears{display:flex;gap:28px}.pet-type-7 .pet-ear{width:18px;height:18px;background:#222;border-radius:50%}
/* 8: 仙人掌 - 绿色 + 花 */
.pet-type-8{--pet-bg:#5a9e6f;--pet-bg2:#3d7a4f;--pet-face-r:35% 35% 40% 40%;--pet-glow:rgba(90,158,111,.3)}
.pet-type-8 .pet-face{border:3px solid #3d7a4f;box-shadow:0 6px 20px var(--pet-glow)}.pet-type-8 .pet-eye{width:6px;height:8px;background:#1a3a1a}.pet-type-8 .pet-mouth{width:8px;border-bottom-color:#1a3a1a}.pet-type-8 .pet-flower{display:block}.pet-type-8 .pet-cheek{background:rgba(255,200,200,.5)}
/* 9: 外星人 - 绿荧光 + 大眼 */
.pet-type-9{--pet-bg:#3ddc84;--pet-bg2:#2ab86a;--pet-face-r:45% 45% 35% 35%;--pet-glow:rgba(61,220,132,.4);--pet-eye:#111}
.pet-type-9 .pet-eye{width:12px;height:14px;background:#111;box-shadow:0 0 8px #3ddc84}.pet-type-9 .pet-antler{display:flex;gap:20px;top:-12px}.pet-type-9 .pet-antler span{width:4px;height:8px;background:#3ddc84;border-radius:50%}.pet-type-9 .pet-mouth{width:8px;border-bottom-width:1.5px}

@keyframes petFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes petShadow{0%,100%{transform:scale(1);opacity:.12}50%{transform:scale(.75);opacity:.06}}
@keyframes petBlink{0%,96%,100%{transform:scaleY(1)}98%{transform:scaleY(.1)}}
@keyframes petThink{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes petThinkEyes{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
/* work & tool animations */
@keyframes petWorkPulse{0%,100%{box-shadow:0 8px 24px var(--pet-glow)}50%{box-shadow:0 8px 36px var(--accent-glow),0 0 60px var(--pet-glow)}}
@keyframes petWorkBounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-12px)}60%{transform:translateY(-4px)}}
@keyframes petToolSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
#deskPet.working .pet-face{animation:petWorkBounce .8s ease-in-out infinite,petWorkPulse 1.5s ease-in-out infinite}
#deskPet.working .pet-eyes{animation:petThinkEyes .4s ease-in-out infinite}
.pet-work-icon{position:absolute;top:-18px;right:-8px;font-size:18px;animation:petWorkBounce .8s ease-in-out infinite;display:none;z-index:1}
#deskPet.working .pet-work-icon{display:block}
.pet-work-icon.spin{animation:petWorkBounce .8s ease-in-out infinite,petToolSpin 2s linear infinite}
/* whip & food effects */
@keyframes whipLash{0%{transform:translateX(0) rotate(0)}15%{transform:translateX(8px) rotate(-6deg)}30%{transform:translateX(-6px) rotate(5deg)}45%{transform:translateX(6px) rotate(-4deg)}60%{transform:translateX(-4px) rotate(3deg)}75%{transform:translateX(3px) rotate(-1deg)}100%{transform:translateX(0) rotate(0)}}
#deskPet.whipped .pet-body{animation:whipLash .5s ease-out}
#deskPet.whipped .pet-face{filter:brightness(1.3) saturate(1.3)}
.pet-whip-mark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;pointer-events:none;animation:whipMark .8s ease-out forwards;z-index:2}
@keyframes whipMark{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5) translateY(-20px)}}
.pet-food{position:absolute;font-size:22px;pointer-events:none;animation:foodFall 1.2s ease-in forwards;z-index:2}
@keyframes foodFall{0%{opacity:1;transform:translateY(-30px) rotate(0deg)}60%{opacity:1;transform:translateY(5px) rotate(180deg)}100%{opacity:0;transform:translateY(20px) rotate(360deg)}}
.pet-v50{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:900;color:#ff4d4f;text-shadow:0 0 12px rgba(255,77,79,.6);pointer-events:none;animation:v50pop .6s ease-out forwards;white-space:nowrap;z-index:2}
@keyframes v50pop{0%{opacity:0;transform:translateX(-50%) scale(.3)}40%{opacity:1;transform:translateX(-50%) scale(1.3)}100%{opacity:1;transform:translateX(-50%) scale(1) translateY(-24px)}}
@keyframes popIn{0%{opacity:0;transform:translateX(-50%) scale(.4)}60%{opacity:1;transform:translateX(-50%) scale(1.2)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
</style>
</head>
<body>
<!-- ═══════ Desktop Pet ═══════ -->
<div id="deskPet" class="pet-type-0" style="bottom:80px;right:24px">
  <div class="pet-bubble" id="petBubble"></div>
  <div class="pet-work-icon" id="petWorkIcon">🔧</div>
  <div class="pet-body">
    <div class="pet-ears"><div class="pet-ear left"></div><div class="pet-ear right"></div></div>
    <div class="pet-antler"><span></span><span></span></div>
    <div class="pet-flower">🌸</div>
    <div class="pet-tail"></div>
    <div class="pet-face">
      <div class="pet-eyes"><div class="pet-eye"></div><div class="pet-eye"></div></div>
      <div class="pet-cheek left"></div><div class="pet-cheek right"></div>

<!-- ═══════════════ SIDEBAR ═══════════════ -->

<!-- ═══════════════ MAIN ═══════════════ -->

</div>

<script>
// ══════════════════════════════════════════════════════════════
// GenericAgent — Application
// ══════════════════════════════════════════════════════════════

const GA_VERSION = '{{ version }}';

// ── Provider presets (global, used by onboard wizard & settings page) ──
window._apPresets={
  openai:{base:'https://api.openai.com/v1',model:'gpt-4o'},
  anthropic:{base:'https://api.anthropic.com',model:'claude-sonnet-4-20250514'},
  minimax:{base:'https://api.minimaxi.com/anthropic',model:'MiniMax-M2.7'},
  deepseek:{base:'https://api.deepseek.com',model:'deepseek-chat'},
  zhipu:{base:'https://open.bigmodel.cn/api/paas/v4',model:'glm-4'},
  moonshot:{base:'https://api.moonshot.cn/v1',model:'moonshot-v1-8k'},
  qwen:{base:'https://dashscope.aliyuncs.com/compatible-mode/v1',model:'qwen-plus'},
  baichuan:{base:'https://api.baichuan-ai.com/v1',model:'Baichuan4'},
  yi:{base:'https://api.lingyiwanwu.com/v1',model:'yi-large'},
  doubao:{base:'https://ark.cn-beijing.volces.com/api/v3',model:'doubao-pro-32k'},
  xai:{base:'https://api.x.ai/v1',model:'grok-2'},
  google:{base:'https://generativelanguage.googleapis.com/v1beta/openai',model:'gemini-2.0-flash'},
  custom:{base:'',model:''}
};

// ── Provider select auto-fill (called after innerHTML in renderSettings) ──
function _setupProviderSelect(){
  const sel=document.getElementById('apSetupProv');
  const base=document.getElementById('apSetupBase');
  const model=document.getElementById('apSetupModel');
  if(!sel||!base||!model)return;
  function update(){const p=(window._apPresets||{})[sel.value];if(p){base.placeholder=p.base;model.placeholder=p.model}}
  sel.addEventListener('change',update);
  update();
}

// ── Theme ──
const THEMES = ['dark','light'];
let themeIdx = 0;
function cycleTheme(){
  themeIdx = (themeIdx + 1) % THEMES.length;
  document.documentElement.setAttribute('data-theme', THEMES[themeIdx]);
  updateThemeBtn();
  localStorage.setItem('hermes-theme', THEMES[themeIdx]);
}
function updateThemeBtn(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
}
(function initTheme(){
  const saved = localStorage.getItem('hermes-theme');
  if (saved) { document.documentElement.setAttribute('data-theme', saved); themeIdx = THEMES.indexOf(saved); }
  updateThemeBtn();
})();

// ── Navigation ──
const NAV = [
  {sec:'核心功能'},
  {id:'dashboard',icon:'📊',label:'仪表盘'},
  {id:'chat',     icon:'💬',label:'多会话'},
  {id:'history',  icon:'📜',label:'历史'},
  {id:'groupchat',icon:'👥',label:'群聊',badge:'new'},
  {id:'moments',  icon:'📱',label:'友圈',badge:'new'},
  {id:'reflect',  icon:'🪞',label:'反思'},
  {id:'agent',    icon:'🤖',label:'代理',devOnly:true},
  {id:'models',   icon:'⚡',label:'模型',devOnly:true},
  {id:'channels', icon:'📡',label:'频道',devOnly:true},

function buildNav(){

      currentSec=item.sec; subItems=[]; currentSecDev=item.devOnly||false; return;

    subItems.push(item);

function flushSubGroup(n, secName, items, secDevOnly=false){
  const group=document.createElement('div');group.className='sb-sub-group';
  if(secDevOnly) group.classList.add('dev-only');
  const toggle=document.createElement('div');toggle.className='sb-sub-toggle';
  const saved=localStorage.getItem('hermes-submenu-'+secName);
  if(saved==='collapsed') toggle.classList.add('collapsed');
  toggle.innerHTML=`<span class="arrow">▼</span>${secName}`;
  toggle.onclick=function(e){e.stopPropagation();this.classList.toggle('collapsed');itemsDiv.classList.toggle('collapsed');localStorage.setItem('hermes-submenu-'+secName,this.classList.contains('collapsed')?'collapsed':'expanded')};
  group.appendChild(toggle);
  const itemsDiv=document.createElement('div');itemsDiv.className='sb-sub-items';
  if(saved==='collapsed') itemsDiv.classList.add('collapsed');
  items.forEach(item=>{
    const d=document.createElement('div');

}

// ── Ripple Effect ──
document.addEventListener('click',function(e){
  const btn = e.target.closest('.btn,.sb-item,.stat-card,.agent-card');
  if(!btn) return;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size+'px';
  ripple.style.left = (e.clientX - rect.left - size/2)+'px';
  ripple.style.top = (e.clientY - rect.top - size/2)+'px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend',()=>ripple.remove());
});

const FONT_SCALES={s:0.85,m:1,l:1.15,xl:1.3};
function setFontSize(size){
  document.documentElement.classList.remove('font-s','font-m','font-l','font-xl');
  document.documentElement.classList.add('font-'+size);
  const scale = FONT_SCALES[size]||1;
  document.documentElement.style.setProperty('--font-scale',scale);
  document.body.style.zoom = String(scale);
  localStorage.setItem('hermes-font-size',size);
}

// ═══════════════ MULTI-SESSION CHAT ═══════════════
let sessions = [];
let activeSid = '';
let chatMsgs = {};
let _streaming = {};  // per-pane: {msgs: true, msgs2: true}
let uploadedFiles = [];

async function loadSessions(){
  try{const d=await api('/sessions/list');sessions=d.sessions||[];activeSid=d.active||activeSid}
  catch(e){sessions=[]}
  // Only create default session when server has NO sessions at all
  if(sessions.length===0){
    await createSession('默认对话');
  }else if(!activeSid || !sessions.find(s=>s.id===activeSid)){
    // Fallback: server has sessions but activeSid is stale/invalid
    activeSid=sessions[0].id;
  }
  // Fetch messages for all sessions to populate chatMsgs
  for(const s of sessions){
    try{
      const d=await api('/sessions/'+encodeURIComponent(s.id)+'/messages');
      chatMsgs[s.id]=d.messages||[];
    }catch(e){if(!chatMsgs[s.id])chatMsgs[s.id]=[]}
  }
}

async function createSession(name){
  const d=await apiPost('/sessions/create',{name:name||'新对话'});
  if(d.session){sessions.push(d.session);activeSid=d.session.id;chatMsgs[activeSid]=[];uploadedFiles=[]}
  return d.session;
}
async function deleteSession(sid){
  if(sessions.length<=1){toast('至少保留一个会话','err');return}
  await api(`/sessions/${encodeURIComponent(sid)}`,{method:'DELETE'});
  sessions=sessions.filter(s=>s.id!==sid);
  delete chatMsgs[sid];
  if(activeSid===sid) activeSid=sessions[0]?.id||'';
  _paneSids=_paneSids.filter(s=>s!==sid);
  if(uploadedFiles.length) uploadedFiles=[];
  renderChatView();
}
async function switchSession(sid){
  if(sid===activeSid)return;
  await apiPost('/sessions/switch',{session_id:sid});
  activeSid=sid;
  // Clear streaming state for all panes to unstick send buttons
  Object.keys(_streaming).forEach(k=>{delete _streaming[k];const b=document.getElementById('cstop'+k.replace('msgs',''));if(b)b.style.display='none';const sb=document.getElementById('csend'+k.replace('msgs',''));if(sb)sb.disabled=false});

  // Remove sid from _paneSids if it was assigned to another pane
  _paneSids=_paneSids.map(s=>s===sid?'':s);
  // Fetch latest messages from server
  try{
    const d=await api('/sessions/'+encodeURIComponent(sid)+'/messages');
    chatMsgs[sid]=d.messages||[];
  }catch(e){if(!chatMsgs[sid])chatMsgs[sid]=[]}
  uploadedFiles=[];
  _curRoundEl=null;
  if(_paneLayout!=='single') renderChatView(); else {renderChatMessages();refreshPaneHeaders();}
  updateSessionTabs();
  // Flash the pane that shows this session
  setTimeout(()=>flashPaneForSession(sid),200);
}
async function renameSession(sid){
  const s = sessions.find(x=>x.id===sid);
  if(!s){toast('未找到该会话','err');return}
  // Use inline editing instead of prompt() for reliability
  const pane = findPaneForSid(sid);
  const nameEl = pane ? pane.querySelector('.pane-name') : null;
  if(nameEl){
    const oldName = s.name||'';
    const input = document.createElement('input');
    input.type='text';input.value=oldName;
    input.style.cssText='font-size:13px;font-weight:600;color:var(--text);background:var(--glass-bg);border:1px solid var(--accent);border-radius:8px;padding:4px 8px;width:100%;min-width:120px;outline:none';
    nameEl.replaceWith(input);
    input.focus();input.select();
    const save = async ()=>{
      const trimmed = input.value.trim();
      if(trimmed && trimmed!==oldName){
        try{
          const d=await apiPost('/sessions/'+encodeURIComponent(sid)+'/rename',{name:trimmed});
          if(d.ok){s.name=trimmed;updateSessionTabs();refreshPaneHeaders();toast('已重命名: '+trimmed,'ok')}
          else{toast('失败: '+(d.error||'未知'),'err')}
        }catch(e){toast('失败: '+e.message,'err');refreshPaneHeaders()}
      }else{refreshPaneHeaders()}
    };
    input.addEventListener('blur',save);
    input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){input.value=oldName;input.blur()}});
  }else{
    // Fallback: prompt (may be blocked by some browsers)
    const name = prompt('重命名会话:', s.name);
    if(name===null)return;
    const trimmed = (name||'').trim();
    if(!trimmed){toast('名称不能为空','err');return}
    try{
      const d=await apiPost('/sessions/'+encodeURIComponent(sid)+'/rename',{name:trimmed});
      if(d.ok){s.name=trimmed;updateSessionTabs();refreshPaneHeaders();toast('已重命名为: '+trimmed,'ok')}
      else{toast('失败: '+(d.error||'未知'),'err')}
    }catch(e){toast('失败: '+e.message,'err')}
  }
}

function updateSessionTabs(){
  const el=document.getElementById('sessionTabs');
  if(!el)return;
  const TABS_ICONS=['💬','📝','💡','🔧','📋','🌟','🎯','🧩','📌','🔮','💎','🌈','🎨','📡','🗂️'];
  el.innerHTML = sessions.map((s,i)=>{
    const active = s.id===activeSid;
    const icon = s.icon || TABS_ICONS[i % TABS_ICONS.length];
    return `<div class="session-tab${active?' active':''}" data-sid="${s.id}" onclick="switchSession('${s.id}')" oncontextmenu="event.preventDefault();renameSession('${s.id}')" title="${esc(s.name)}${active?' (当前)':''}">
      <span class="tab-icon">${icon}</span>
      ${esc(s.name.substring(0,16))}${s.name.length>16?'…':''}
      <span class="close" onclick="event.stopPropagation();deleteSession('${s.id}')" title="关闭会话">×</span>
    </div>`;
  }).join('') + `<div class="session-tab-add" onclick="addSession()" title="新建会话">＋</div>`;
}
async function addSession(){
  const name = prompt('会话名称:','新对话');
  if(name===null)return;
  await createSession(name||'新对话');
  updateSessionTabs();
  renderChatMessages();
}

let _curRoundEl = null;
let _paneLayout = 'single';  // 'single','2h','2v','3h','2x2'
let _paneSids = [];           // session IDs for panes [0]=main, [1]=right, etc.
const PANE_LAYOUTS = [
  {id:'single',icon:'📱',label:'单窗',panes:1},
  {id:'2h',icon:'◫',label:'左右',panes:2},
  {id:'2v',icon:'⬜',label:'上下',panes:2},

];

function renderChatMessages(targetId, msgsOverride){
  const elId = targetId || 'msgs0';
  const el=document.getElementById(elId);
  if(!el)return;
  const msgs = msgsOverride || (chatMsgs[activeSid]||[]);
  if(!msgs.length){
    el.innerHTML=`<div class="empty"><div class="icon">💬</div><h3>开始对话</h3><p>输入消息，Enter发送，Shift+Enter换行</p></div>`;
    return;
  }
  el.innerHTML='<div class="fold-all-bar"><button onclick="foldAllRounds(\''+elId+'\')">📁 全部折叠</button><button onclick="expandAllRounds(\''+elId+'\')">📂 全部展开</button></div>';
  const paneIdx = targetId && targetId.startsWith('msgs') ? parseInt(targetId.replace('msgs',''))||0 : 0;
  const sid = paneIdx > 0 && _paneSids[paneIdx-1] ? _paneSids[paneIdx-1] : activeSid;
  const saved = JSON.parse(localStorage.getItem('hermes-fold-'+sid)||'{}');
  let rounds=[], cur=null;
  msgs.forEach(m=>{
    if(m.role==='user'){if(cur)rounds.push(cur);cur={user:m,assistant:null}}
    else if(m.role==='assistant'&&cur){cur.assistant=m}
    else{if(cur)rounds.push(cur);rounds.push({user:m,assistant:null});cur=null}
  });
  if(cur) rounds.push(cur);
  const foldKey = 'fold-round-'+sid;
  // Build flat message index map for quote feature (per-pane)
  window._msgLookup = window._msgLookup||{};
  window._msgLookup[elId] = {};
  let msgIdx = 0;
  msgs.forEach(m=>{ window._msgLookup[elId][msgIdx] = m; msgIdx++; });
  let mi = 0;

function fmtContent(t){
  if(!t)return'';
  let s=esc(t);
  // Clean technical output from agent responses
  s=s.replace(/\*\*Turn \d+ \.\.\.\*\*/g,'');
  s=s.replace(/Turn \d+ \.\.\./g,'');
  s=s.replace(/🛠️ [^\n]*\n*/g,'');
  s=s.replace(/\[Info\][^\n]*\n?/g,'');
  s=s.replace(/!!!Error:[^\n]*\n?/g,'');
  s=s.replace(/<summary>[^<]*<\/summary>/g,'');
  // Strip code blocks — bot should reply in natural language
  s=s.replace(/```[\s\S]*?```/g,'');
  s=s.replace(/`([^`]+)`/g,'$1');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\[FILE:(.+?)\]/g,'<div style="background:var(--glass-bg-light);border:1px solid var(--glass-border);border-radius:8px;padding:6px 10px;margin:4px 0;font-size:12px">📎 $1</div>');
  // Clean up extra blank lines
  s=s.replace(/\n{3,}/g,'\n\n');
  return s.trim();
}

async function setPaneLayout(layoutId){
  const layout = PANE_LAYOUTS.find(l=>l.id===layoutId);
  if(!layout) return;
  _paneLayout = layoutId;
  // Ensure enough sessions exist for panes
  while(_paneSids.length < layout.panes - 1){
    const s = sessions.find(x=>x.id!==activeSid && !_paneSids.includes(x.id)) || await createSession('窗'+(_paneSids.length+2));
    _paneSids.push(s.id);
  }
  // Trim extra panes
  _paneSids = _paneSids.slice(0, Math.max(0, layout.panes - 1));
  _curRoundEl = null;
  renderChatView();
}

let _dragSetup = false;
function setupDragDrop(){
  const main = document.getElementById('main');
  const overlay = document.getElementById('chatDragOverlay');
  if(!main||!overlay)return;
  if(_dragSetup) return;
  _dragSetup = true;
  let counter=0;
  main.addEventListener('dragenter',e=>{e.preventDefault();counter++;if(counter===1)overlay.classList.add('show')});
  main.addEventListener('dragleave',e=>{e.preventDefault();counter--;if(counter===0)overlay.classList.remove('show')});
  main.addEventListener('dragover',e=>{e.preventDefault()});
  main.addEventListener('drop',async e=>{
    e.preventDefault();counter=0;overlay.classList.remove('show');
    const files = e.dataTransfer?.files; if(!files||!files.length)return;
    for(const f of files){
      if(cur==='groupchat') await uploadGCFile(f);
      else await uploadFile(f);
    }
  });
}

document.addEventListener('paste',async e=>{
  if(cur!=='chat'&&cur!=='groupchat')return;
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const blob=item.getAsFile();
      const reader=new FileReader();
      reader.onload=async()=>{
        const base64=reader.result;
        try{
          const r=await fetch('/api/image/paste',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64})});
          const d=await r.json();
          if(d.ok){
            if(cur==='groupchat'){gcFiles.push(d);renderGCFileChips();toast('截图已粘贴到群聊','ok')}
            else{uploadedFiles.push(d);renderFileChips();toast('截图已粘贴','ok')}
          }
          else toast(d.error||'粘贴失败','err');
        }catch(ex){toast('粘贴失败: '+ex.message,'err')}
      };
      reader.readAsDataURL(blob);return;
    }
  }
});

async function sendChat(targetId){
  targetId = targetId || 'msgs0';
  const paneNum = (targetId.startsWith('msgs') ? parseInt(targetId.replace('msgs','')) : 0) || 0;
  const suffix = String(paneNum);
  const inpId = 'cinput' + suffix;
  const btnId = 'csend' + suffix;
  const stopId = 'cstop' + suffix;
  const csendBtn = document.getElementById(btnId);
  const paneIdx = paneNum;
  const sid = paneIdx > 0 && _paneSids[paneIdx-1] ? _paneSids[paneIdx-1] : activeSid;
  const inp=document.getElementById(inpId);const msg=(inp?.value||'').trim();if(!msg)return;
  // Auto-abort current streaming task if user sends new message
  if(_streaming[targetId]){
    await fetch('/api/abort',{method:'POST'});
    delete _streaming[targetId];
    if(csendBtn)csendBtn.disabled=false;
    const sbb=document.getElementById(stopId);if(sbb)sbb.style.display='none';
    await new Promise(r=>setTimeout(r,400));
  }
  inp.value='';inp.style.height='auto';
  const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  appendMsg('user',msg,ts,targetId);
  const filePaths=uploadedFiles.map(f=>f.path);uploadedFiles=[];renderFileChips();

  if(msg.startsWith('/')){
    try{
      const d=await apiPost('/chat/stream',{message:msg,session_id:sid,files:filePaths,quote:_quotedMsg[targetId]||undefined});
      appendMsg('assistant',d.content||JSON.stringify(d),new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),targetId);
    }catch(e){appendMsg('assistant','❌ '+e.message,new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),targetId)}
    clearQuote(targetId);return;
  }
  _streaming[targetId]=true;if(csendBtn)csendBtn.disabled=true;
  const sb=document.getElementById(stopId);if(sb){sb.style.display='';sb.onclick=async()=>{await fetch('/api/abort',{method:'POST'});}}
  const thinkEl=appendThink(targetId);let full='',msgEl=null;
  const toolCards={};let toolSeq=0; // track tool card elements
  const quoteData = _quotedMsg[targetId]; clearQuote(targetId);
  try{
    const res=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,session_id:sid,files:filePaths,quote:quoteData||undefined})});
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{const d=JSON.parse(line.slice(6));
          if(d.type==='tool_start'){
            if(thinkEl)thinkEl.remove();
            const elId=targetId||'msgs0';const chatEl=document.getElementById(elId);
            if(chatEl){
              toolSeq++;const cardId='tc_'+toolSeq;
              const card=document.createElement('div');card.className='tool-card running';card.id=cardId;
              card.innerHTML=`<div class="tool-card-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div class="tool-spinner"></div>
                <span class="tool-card-icon">🔧</span>
                <span class="tool-card-name">${esc(d.tool)}</span>
                <span class="tool-card-status">执行中...</span>
                <span class="tool-card-arrow">▶</span>
              </div>
              <div class="tool-card-body">
                ${d.args?`<div class="tc-section"><div class="tc-label">📥 参数</div><pre>${esc(d.args)}</pre></div>`:''}
              </div>`;
              chatEl.appendChild(card);toolCards[cardId]=card;scrollChat(targetId);
            }
          }
          else if(d.type==='tool_result'){
            const cardId='tc_'+toolSeq;
            const card=toolCards[cardId];
            if(card){
              card.classList.remove('running');card.classList.add('done');
              const header=card.querySelector('.tool-card-header');
              const spinner=card.querySelector('.tool-spinner');if(spinner)spinner.remove();
              const status=card.querySelector('.tool-card-status');if(status)status.textContent='完成';
              const body=card.querySelector('.tool-card-body');
              if(body&&d.result){
                let bodyHTML=body.innerHTML;
                bodyHTML+=`<div class="tc-section"><div class="tc-label">📤 结果</div><pre>${esc(d.result)}</pre></div>`;
                body.innerHTML=bodyHTML;
              }
            }
          }
          else if(d.type==='chunk'){if(thinkEl)thinkEl.remove();full=d.content;
            if(!msgEl){msgEl=appendMsgEl('assistant',full,ts,targetId);if(msgEl)msgEl.id='smsg'}
            else{const bub=msgEl.querySelector('.bub');if(bub)bub.innerHTML=fmtContent(full);scrollChat(targetId)}}
          else if(d.type==='done'){if(thinkEl)thinkEl.remove();
            const final=d.content||full;
            if(msgEl){const bub=msgEl.querySelector('.bub');if(bub)bub.innerHTML=fmtContent(final);msgEl.removeAttribute('id')}
            else if(!d.aborted&&final) appendMsgEl('assistant',final,ts,targetId);
            if(!d.aborted&&final){
              if(!chatMsgs[sid])chatMsgs[sid]=[];
              chatMsgs[sid].push({role:'assistant',content:final,ts:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});syncHistoryAfterMsg(sid)
            }}
          else if(d.type==='error'){if(thinkEl)thinkEl.remove();appendMsgEl('assistant','❌ '+d.content,ts,targetId)}
        }catch(e){}
      }
    }
  }catch(e){if(thinkEl)thinkEl.remove();appendMsgEl('assistant','❌ '+e.message,ts,targetId)}
  const se=document.getElementById('smsg');if(se)se.removeAttribute('id');
  delete _streaming[targetId];if(csendBtn)csendBtn.disabled=false;const sbb=document.getElementById(stopId);if(sbb)sbb.style.display='none';
}

// ── Pane Session Resolution (dynamic, never stale) ──
function getPaneSid(i){
  if(i===0) return activeSid;
  return _paneSids[i-1] || activeSid;
}
function findTabForSid(sid){
  return document.querySelector(`.session-tab[data-sid="${sid}"]`);
}
function findPaneForSid(sid){
  // Return first pane whose resolved session matches
  const panes = document.querySelectorAll('.chat-pane');
  for(const p of panes){
    const pi = parseInt(p.getAttribute('data-pane')||'0');
    if(getPaneSid(pi)===sid) return p;

// ── History Panel ──
function toggleHistoryPanel(histId){
  const panel = document.getElementById(histId);
  const tgl = document.getElementById(histId+'_tgl');
  if(!panel||!tgl)return;
  const isOpen = panel.classList.toggle('open');
  tgl.classList.toggle('open',isOpen);
  if(isOpen){
    const paneNum = parseInt(histId.replace('hist',''))||0;
    const sid = getPaneSid(paneNum);
    refreshHistoryPanel(histId, sid);
  }
}
function refreshHistoryPanel(histId, sid){
  const panel = document.getElementById(histId);
  const cntEl = document.getElementById(histId+'_cnt');
  const emptyEl = document.getElementById(histId+'_empty');
  if(!panel)return;
  sid = sid || activeSid;
  const msgs = chatMsgs[sid]||[];
  let turns=[], cur=null;
  msgs.forEach(m=>{
    if(m.role==='user'){if(cur)turns.push(cur);cur={user:m,assistant:null,ts:m.ts}}
    else if(m.role==='assistant'&&cur){cur.assistant=m}
    else{if(cur)turns.push(cur);turns.push({user:m,assistant:null,ts:m.ts});cur=null}
  });
  if(cur)turns.push(cur);
  if(cntEl)cntEl.textContent=`(${turns.length}轮)`;
  if(!turns.length){
    panel.innerHTML='<div class="history-empty">暂无聊天记录</div>';
    if(emptyEl)emptyEl.style.display='';
    return;
  }
  if(emptyEl)emptyEl.style.display='none';
  const elId=histId.replace('hist','msgs');
  panel.innerHTML=turns.map((t,i)=>{
    const preview=(t.user?.content||t.assistant?.content||'').replace(/<[^>]*>/g,'').substring(0,50);
    const icon=t.user?.role==='user'?'👤':'🤖';
    return `<div class="history-item" onclick="scrollToTurn('${elId}',${i})" title="点击跳转"><span class="hi-icon">${icon}</span><span class="hi-preview">${esc(preview)}</span><span class="hi-time">${t.ts||''}</span></div>`;
  }).join('');
}
function scrollToTurn(elId,turnIdx){
  const el=document.getElementById(elId);if(!el)return;
  const rounds=el.querySelectorAll('.round-fold');
  if(rounds[turnIdx]){rounds[turnIdx].scrollIntoView({behavior:'smooth',block:'start'});rounds[turnIdx].style.background='var(--glass-bg-strong)';setTimeout(()=>{if(rounds[turnIdx])rounds[turnIdx].style.background=''},1500)}
}

function refreshPaneHeaders(){

    const sid=getPaneSid(i);

    const nameEl=pane.querySelector('.pane-name');
    const iconEl=pane.querySelector('.pane-icon');

    if(iconEl){const TABS_ICONS_ARR=['💬','📝','💡','🔧','📋','🌟','🎯','🧩','📌','🔮','💎','🌈','🎨','📡','🗂️'];iconEl.textContent=s.icon||TABS_ICONS_ARR[i%15]}
    if(badgeEl)badgeEl.style.background=s.color||'var(--accent)';
  });
}

// ── Sync History ──
function syncHistoryAfterMsg(sid){
  document.querySelectorAll('.history-panel.open').forEach(panel=>{

  let barHTML = `<div class="rp-batch-bar" id="rpBatchBar" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--glass-border);background:var(--glass-bg)">

  }

    const msgCount = (s.messages || []).length;
    const lastMsg = s.messages?.slice(-1)[0];
    const preview = lastMsg ? lastMsg.content.substring(0, 40) : '';
    const checked = _selectedRPSessions.has(s.id) ? ' checked' : '';
    return `<div class="rp-item${isActive ? ' active' : ''}">
      <label class="rp-check" style="display:flex;align-items:flex-start;gap:8px;cursor:pointer" onclick="event.stopPropagation()">

          ${preview ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${esc(preview)}</div>` : ''}
        </div>
      </label>

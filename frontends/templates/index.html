        <button class="btn sm ghost" onclick="event.stopPropagation();restoreRPSession('${s.id}')">🔄 恢复</button>
        <button class="btn red sm" onclick="event.stopPropagation();deleteRPSession('${s.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function filterRPSessions() { refreshRPSessions(); }

function toggleSelectAllRPSessions(checked) {
  const el = document.getElementById('rpList');
  if (!el) return;
  const items = el.querySelectorAll('.rp-item');
  items.forEach(item => {
    const cb = item.querySelector('input[type="checkbox"]');
    const sid = cb ? cb.getAttribute('onchange')?.match(/toggleRPSession\('(.*?)',/)?.[1] : null;
    if (cb) cb.checked = checked;
    if (sid) {
      if (checked) _selectedRPSessions.add(sid);
      else _selectedRPSessions.delete(sid);
    }
  });
  refreshRPSessions();
}

function toggleRPSession(sid, checked) {
  if (checked) _selectedRPSessions.add(sid);
  else _selectedRPSessions.delete(sid);
  refreshRPSessions();
}

async function batchDeleteRPSessions() {
  const ids = Array.from(_selectedRPSessions);
  if (!ids.length) return;
  if (ids.length === sessions.length) { toast('至少保留一个会话', 'err'); return }
  if (!confirm(`确定要删除选中的 ${ids.length} 个会话吗？此操作不可逆。`)) return;
  const d = await apiPost('/sessions/batch-delete', { ids });
  if (d.ok) {
    _selectedRPSessions.clear();
    sessions = sessions.filter(s => !ids.includes(s.id));
    ids.forEach(sid => delete chatMsgs[sid]);
    _paneSids = _paneSids.map(s => ids.includes(s) ? '' : s);
    if (ids.includes(activeSid)) activeSid = sessions[0]?.id || '';
    refreshRPSessions();
    updateSessionTabs();
    if (cur === 'chat') renderChatMessages();
    toast(`已删除 ${d.deleted} 个会话`, 'ok');
  } else {
    toast(d.error || '删除失败', 'err');
  }
}

async function restoreRPSession(sid) {
  await switchSession(sid);
  if (cur !== 'chat') goPage('chat');
  else renderChatView();
  refreshRPSessions();
  toast('会话已恢复', 'ok');
}

async function deleteRPSession(sid) {
  if (!confirm('确定删除该会话？此操作不可逆。')) return;
  await api(`/sessions/${encodeURIComponent(sid)}`, { method: 'DELETE' });
  sessions = sessions.filter(s => s.id !== sid);
  delete chatMsgs[sid];
  if (activeSid === sid) activeSid = sessions[0]?.id || '';
  refreshRPSessions();
  updateSessionTabs();
  if (cur === 'chat') renderChatMessages();
  toast('会话已删除', 'ok');
}

async function submitNewMoment(){
  const agentSel=document.getElementById('gmagent');
  const topicEl=document.getElementById('gmtopic');
  const contentEl=document.getElementById('gmcontent');
  const imageEl=document.getElementById('gmimage');

  const [agent_name,agent_icon,agent_color] = (agentSel?.value||'Agent|🤖|#58a6ff').split('|');
  const topic = (topicEl?.value||'').trim();
  const content = (contentEl?.value||'').trim();
  const imageFile = imageEl?.files?.[0];

  closeModal();

  // If user provided content directly, post it
  if(content){
    let imagePath='';
    if(imageFile){
      const form=new FormData();form.append('file',imageFile);
      try{const r=await fetch('/api/upload',{method:'POST',body:form});const d=await r.json();if(d.ok)imagePath=d.path}catch(e){}
    }
    await apiPost('/moments/post',{content,agent_name,agent_icon,agent_color,image:imagePath});
    refreshMoments();toast('动态已发布','ok');return;
  }

  // Otherwise, ask agent to generate
  const res=await fetch('/api/moments/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_name,agent_icon,agent_color,topic})});
  const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
  toast('Agent正在思考...','ok');
  while(true){
    const{done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
  }
  refreshMoments();
}

async function doOCRGC(i){
  const f=gcFiles[i];if(!f)return;
  const chips=document.querySelectorAll('#gcFileChips .file-chip');
  let ocrEl=chips[i]?.querySelector('.ocr-result');

    const r=await fetch('/api/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:f.path})});

}

async function sendGC(){
  const inp=document.getElementById('gcinput');const msg=inp.value.trim();if(!msg||gcStreaming)return;
  inp.value='';gcStreaming=true;document.getElementById('gcsend').disabled=true;
  const gcStopBtn=document.getElementById('gcstop');if(gcStopBtn)gcStopBtn.style.display='';
  // Collect files and their paths
  const filePaths=gcFiles.map(f=>f.path);
  const sentFiles=[...gcFiles]; // keep copy for display
  gcFiles=[];renderGCFileChips();
  // Echo user message with files
  const el=document.getElementById('gcout');if(el){if(el.querySelector('.empty'))el.innerHTML='';
  appendGCMsgEl({agent:'你',icon:'👤',color:'#7c6ff7',content:msg,ts:new Date().toLocaleString(),files:sentFiles});
  gcMsgs.push({agent:'你',icon:'👤',color:'#7c6ff7',content:msg,ts:new Date().toLocaleString(),files:sentFiles});}
  const supervision = gcSupervision ? {enabled:true,max_rounds:parseInt(document.getElementById('gcsuprounds')?.value||2)} : {enabled:false};
  try{
    const res=await fetch('/api/groupchat/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,agents:gcAgents,supervision,files:filePaths})});
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='',currentEl=null;
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{const d=JSON.parse(line.slice(6));
          if(d.type==='agent_start'){
            currentEl=document.createElement('div');currentEl.className='gc-msg';
            const mdl=d.model?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${esc(d.model)}</span>`:'';
            currentEl.innerHTML=`<div class="gc-agent"><div class="gc-avatar" style="background:${d.color||'#58a6ff'}">${d.icon||'🤖'}</div><strong>${esc(d.agent)}</strong>${mdl}<span style="font-size:10px;color:var(--text3);margin-left:4px">输入中...</span></div><div class="gc-content" style="font-size:13px;line-height:1.55;white-space:pre-wrap"></div>`;
            el.appendChild(currentEl);el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='chunk'&&currentEl){
            const cd=currentEl.querySelector('.gc-content');if(cd)cd.innerHTML=fmtContent(d.content||'');
            el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='agent_done'){
            if(currentEl){
              const cd=currentEl.querySelector('.gc-content');if(cd)cd.innerHTML=fmtContent(d.content||'');
              const status=currentEl.querySelector('.gc-agent span');if(status)status.remove();
              gcMsgs.push({agent:d.agent,icon:d.icon,color:d.color,content:d.content,ts:new Date().toLocaleString()});
            }
            currentEl=null;el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='info'){
            const infoEl=document.createElement('div');infoEl.className='gc-msg';
            infoEl.innerHTML=`<div style="font-size:12px;color:var(--text2)">${esc(d.content)}</div>`;
            el.appendChild(infoEl);el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='supervision_round'){
            const rEl=document.createElement('div');rEl.className='gc-msg';
            rEl.innerHTML=`<div style="font-size:12px;color:var(--text3);text-align:center;padding:4px;border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border)">🔍 监督审查 第${d.round}/${d.max}轮</div>`;
            el.appendChild(rEl);el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='supervision_start'){
            currentEl=document.createElement('div');currentEl.className='gc-msg';
            currentEl.innerHTML=`<div class="gc-agent"><div class="gc-avatar" style="background:#d29922">👁️</div><strong>${esc(d.agent)}</strong><span style="font-size:10px;color:var(--text3);margin-left:4px">审查中...</span></div><div class="gc-content" style="font-size:13px;line-height:1.55;white-space:pre-wrap"></div>`;
            el.appendChild(currentEl);el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='supervision_chunk'&&currentEl){
            const cd=currentEl.querySelector('.gc-content');if(cd)cd.innerHTML=fmtContent(d.content||'');
            el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='supervision_feedback'){
            if(currentEl){const st=currentEl.querySelector('.gc-agent span');if(st)st.remove();currentEl=null}
            const fbEl=document.createElement('div');fbEl.className='gc-msg';
            const isOk=d.verdict==='ok';
            fbEl.innerHTML=`<div style="font-size:12px;padding:8px;border-left:3px solid ${isOk?'var(--green)':'var(--orange)'};background:var(--glass-bg-light);border-radius:4px"><strong>${isOk?'✅ 审查通过':'⚠️ 需要修正'}</strong><div style="margin-top:4px;white-space:pre-wrap">${fmtContent(d.content||'')}</div></div>`;
            el.appendChild(fbEl);el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='correction_start'){
            const crEl=document.createElement('div');crEl.className='gc-msg';
            crEl.innerHTML=`<div style="font-size:12px;color:var(--orange);text-align:center;padding:4px">🔄 ${esc(d.agent)} 正在根据反馈修正: ${esc(d.issue||'')}</div>`;
            el.appendChild(crEl);el.scrollTop=el.scrollHeight;
          }
          else if(d.type==='done'){currentEl=null;el.scrollTop=el.scrollHeight}
        }catch(e){}
      }
    }
  }catch(e){
    const errEl=document.createElement('div');errEl.className='gc-msg';
    errEl.innerHTML=`<div style="color:var(--red)">❌ ${esc(e.message)}</div>`;
    el.appendChild(errEl);
  }
  gcStreaming=false;document.getElementById('gcsend').disabled=false;
  const gcsb=document.getElementById('gcstop');if(gcsb)gcsb.style.display='none';
  saveGCHistory();
}

function downloadGCChat(){
  if(!gcMsgs.length){toast('无群聊记录可导出','err');return}
  // Ask: JSON or Markdown
  const expJson = confirm('点击「确定」导出JSON（可重新导入）\n点击「取消」导出Markdown（可阅读）');
  if(expJson){
    const data = {version:'1.0',exported:new Date().toISOString(),messages:gcMsgs};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='groupchat_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
    toast('群聊已导出为 JSON','ok');
  }else{
    let text = '# GenericAgent Group Chat\n';
    text += '# Exported: '+new Date().toISOString()+'\n\n';
    gcMsgs.forEach(m=>{
      text += '## '+esc(m.agent||'System')+' ('+(m.ts||'')+')\n';
      text += (m.content||'')+'\n\n';
    });
    const blob = new Blob([text],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='groupchat_'+new Date().toISOString().slice(0,10)+'.md';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
    toast('群聊已导出为 Markdown','ok');
  }
}
function importGCChat(){
  const inp = document.getElementById('_gc_import_file');
  if(inp){inp.click();return}
  // Create hidden file input
  const fi = document.createElement('input');
  fi.type='file';fi.accept='.json,.md,.txt';fi.id='_gc_import_file';fi.style.display='none';
  fi.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file)return;
    try{
      const text = await file.text();
      let msgs = [];
      if(file.name.endsWith('.json')){
        const data = JSON.parse(text);
        msgs = data.messages || data || [];
      }else{
        // Parse markdown: ## Agent Name\ncontent
        const sections = text.split(/\n## /);
        sections.forEach(sec => {
          const lines = sec.trim().split('\n');
          const agent = lines[0].replace(/^## /,'').replace(/\(.*\)/,'').trim();
          const content = lines.slice(1).join('\n').trim();
          if(agent && content) msgs.push({agent,icon:'🤖',color:'#58a6ff',content,ts:''});
        });
      }
      if(!msgs.length){toast('未能解析任何消息','err');return}
      gcMsgs = msgs;
      await saveGCHistory();
      // Rerender
      const el = document.getElementById('gcout');
      if(el){
        el.innerHTML='';
        gcMsgs.forEach(m=>appendGCMsgEl(m));
        el.scrollTop=el.scrollHeight;
      }
      toast(`已导入 ${msgs.length} 条群聊记录`,'ok');
    }catch(e){toast('导入失败: '+e.message,'err')}
    fi.remove();
  };
  document.body.appendChild(fi);
  fi.click();
}

  try{await apiPost('/groupchat/history/save',{messages:gcMsgs})}catch(e){}
}

  try{const d=await api('/groupchat/history');gcMsgs=d.messages||[]}catch(e){gcMsgs=[]}

async function showGCHistory(){
  // Reload from disk to get latest
  let msgs = [];
  try{const d=await api('/groupchat/history');msgs=d.messages||[]}catch(e){}
  if(!msgs.length){msgs=gcMsgs} // fallback to current session
  if(!msgs.length){toast('暂无群聊历史记录','err');return}
  let list='';

let modelsData={builtin:[],custom:[],all:[]};
async function renderModels(){
  C.style.padding='20px 24px';C.style.display='block';
  try{modelsData=await api('/models/merged')}catch(e){modelsData={builtin:[],custom:[],all:[]}}
  let h='';
  // Preset models
  const anyUnvalidated=modelsData.builtin.some(m=>m.validated===null||m.validated===undefined);
  h+=`<div class="card"><div class="flex-between mb"><h3>⚡ 预设模型 (mykey.py)</h3><div class="row" style="gap:8px"><span class="tag">${modelsData.builtin.length} 个</span>`;

  h+=`</div></div>`;
  if(!modelsData.builtin.length) h+='<p style="color:var(--text2)">暂无预设模型，请在 mykey.py 中配置</p>';
  else{
    h+='<table><tr><th>#</th><th>名称</th><th>模型</th><th>类型</th><th>验证</th><th>状态</th><th>操作</th></tr>';
    modelsData.builtin.forEach(m=>{
      // Validation status badge
      let valBadge='';
      if(m.validated===true) valBadge='<span style="color:var(--green)" title="API Key 有效 · 延迟 '+m.latency_ms+'ms">✅ 已验证</span>';
      else if(m.validated===false) valBadge=`<span style="color:var(--red)" title="${esc(m.validation_error||'')}">❌ 无效</span>`;
      else valBadge='<span style="color:var(--text3)">⏳ 未验证</span>';

      // Switch button: disabled if validation failed
      let switchBtn='-';
      if(!m.active){
        if(m.validated===false){
          switchBtn=`<button class="btn sm ghost" disabled style="opacity:.4" title="${esc(m.validation_error||'API Key 无效')}">不可用</button>`;
        }else{
          switchBtn=`<button class="btn acc sm" onclick="switchLLM(${m.index})">切换</button>`;
        }
      }

      h+=`<tr><td>${m.index}</td><td>${esc(m.name)}</td><td>${esc(m.model||'-')}</td><td><span class="tag">${esc(m.type||'-')}</span></td>
        <td>${valBadge}</td>
        <td><span class="tag ${m.active?'on':'off'}">${m.active?'当前':'可用'}</span></td>
        <td>${switchBtn} <button class="btn red sm ghost" onclick="deleteBuiltinModel('${esc(m.key)}')" title="从 mykey.py 中删除此模型" style="font-size:10px">🗑</button></td></tr>`;
    });
    h+='</table>';
  }
  h+='</div>';
  // Custom models
  h+=`<div class="card"><div class="flex-between mb"><h3>🔧 自定义模型</h3><button class="btn acc sm" onclick="showAddModelForm()">➕ 添加自定义</button></div>`;
  if(!modelsData.custom.length) h+='<p style="color:var(--text2)">暂无自定义模型，点击上方按钮添加</p>';
  else{
    h+='<table><tr><th>Provider</th><th>模型</th><th>API Base</th><th>类型</th><th>操作</th></tr>';
    modelsData.custom.forEach(m=>{
      h+=`<tr><td>${esc(m.provider_name)}</td><td>${esc(m.model_name)}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(m.api_base)}</td>
        <td><span class="tag">${esc(m.type)}</span></td>
        <td>
          <button class="btn sm" onclick="testModelConnection('${m.id}')">🔍 测试</button>
          <button class="btn sm ghost" onclick="showAddModelForm('${m.id}')">✏️</button>
          <button class="btn red sm" onclick="deleteCustomModel('${m.id}')">🗑</button>
        </td></tr>`;
    });
    h+='</table>';
  }
  h+='</div>';
  // Model params
  try{
    const p=await api('/model_params');
    h+=`<div class="card"><h3>🔧 模型参数</h3><table>`;
    const params=p.params||{};
    ['model','max_tokens','temperature','top_p','connect_timeout','read_timeout','max_retries','thinking_type'].forEach(k=>{
      h+=`<tr><td style="width:160px">${k}</td><td><input id="pm_${k}" value="${esc(String(params[k]||''))}" style="width:100%"></td></tr>`;
    });
    h+=`</table><div class="row mt"><button class="btn acc" onclick="saveModelParams()">💾 保存参数</button><span style="font-size:11px;color:var(--text3)">修改后立即生效</span></div></div>`;
  }catch(e){}
  h+='<div id="modelTestResult"></div>';
  C.innerHTML=h;
}

async function channelConfig(name) {
  const el = document.getElementById('chcfg-' + name);
  if (!el) return;
  try {
    const d = await api('/channels/' + encodeURIComponent(name) + '/config');
    const cfg = d.config || {};
    const hints = CHANNEL_CFG_HINTS[name]||{};
    const hintKeys = hints.keys||[];
    let fields = '';
    hintKeys.forEach(k => {
      fields += `<div style="margin-bottom:4px"><label style="font-size:11px;color:var(--text3);display:block">${esc(k)}</label><input id="cfg-${k}" value="${esc(d.mykey_values&&d.mykey_values[k]||'')}" placeholder="${esc(hints.desc||'')}" style="width:100%;font-family:monospace;font-size:11px"></div>`;
    });
    // Allowed users
    const allowedKey = hints.allowed_key||'';
    const allowedVal = (d.mykey_values&&d.mykey_values[allowedKey]) ? JSON.stringify(d.mykey_values[allowedKey]) : '';
    if(allowedKey){
      fields += `<div style="margin-bottom:4px"><label style="font-size:11px;color:var(--text3);display:block">${esc(allowedKey)} (授权用户, JSON数组或['*'])</label><input id="cfg-${allowedKey}" value="${esc(allowedVal)}" placeholder='["*"]' style="width:100%;font-family:monospace;font-size:11px"></div>`;
    }
    el.innerHTML = `<div class="card" style="margin:0;padding:12px">
      <strong>配置 ${esc(name)}</strong>
      ${cfg.token_set ? `<span style="color:var(--green);font-size:11px;margin-left:8px">✅ 已配置: ${esc((cfg.keys||[]).join(', ')||'无')}</span>` : '<span style="color:var(--red);font-size:11px;margin-left:8px">❌ 未配置</span>'}
      <div style="margin-top:8px">${fields||'<p style="font-size:11px;color:var(--text3)">该平台暂无Web可配置项，请直接编辑 mykey.py</p>'}</div>
      ${fields?`<div class="row mt"><button class="btn acc sm" onclick="saveChannelConfig('${name}')">💾 保存配置</button><span style="font-size:10px;color:var(--text3)">保存后需重启频道生效</span></div>`:''}
      </div>`;
  } catch(e) { el.innerHTML = `<p style="color:var(--red);font-size:12px">获取配置失败</p>`; }
}

async function saveChannelConfig(name){
  const hints = CHANNEL_CFG_HINTS[name]||{};
  const hintKeys = hints.keys||[];
  const data = {};
  hintKeys.forEach(k => { const el=document.getElementById('cfg-'+k); if(el)data[k]=el.value.trim(); });
  const allowedKey = hints.allowed_key||'';
  if(allowedKey){ const el=document.getElementById('cfg-'+allowedKey); if(el&&el.value.trim()){ try{data[allowedKey]=JSON.parse(el.value.trim())}catch(e){data[allowedKey]=el.value.trim()} } }
  try{
    const r = await apiPost('/channels/'+encodeURIComponent(name)+'/save-config', data);
    toast(r.ok?'配置已保存，请重启频道':'保存失败: '+(r.error||''), r.ok?'ok':'err');
  }catch(e){toast('保存失败: '+e.message,'err');}
}

async function globalAuthorize(){

async function saveApiKeySimple(){

  let model=document.getElementById('apSetupModel').value.trim();
  const p=(window._apPresets||{})[prov]||{};
  if(!base)base=p.base||'';
  if(!model)model=p.model||'gpt-4o';
  if(!key){document.getElementById('apSetupMsg').innerHTML='<span style="color:var(--red)">❌ 请输入 API Key</span>';return}
  document.getElementById('apSetupMsg').innerHTML='<span style="color:var(--orange)">⏳ 正在保存...</span>';
  try{
    const d=await apiPost('/settings/apikey',{provider:prov,api_key:key,api_base:base,model:model});

      document.getElementById('apSetupMsg').innerHTML='<span style="color:var(--green)">✅ '+esc(d.message)+'</span>';

    document.getElementById('apSetupMsg').innerHTML='<span style="color:var(--red)">❌ '+esc(e.message)+'</span>';

}

async function checkUpdate(){
  const st=document.getElementById('updateStatus');
  st.innerHTML='<p style="font-size:13px;color:var(--orange)">⏳ 正在检查更新...</p>';
  try{
    const d=await api('/update/check');
    if(!d.ok){
      const isSourceErr = d.error && d.error.includes('update_source');
      st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ ${esc(d.error)}</p>`+
        (isSourceErr?`<button class="btn acc" onclick="fixUpdateSource()" style="margin-top:6px">🔧 一键修复</button>`:'');
      return;
    }
    if(d.has_update){
      st.innerHTML=`<p style="font-size:13px;color:var(--green)">🆕 发现新版本: <strong>v${esc(d.latest)}</strong> (当前 v${esc(d.current)})</p>
        ${d.changelog?`<p style="font-size:12px;color:var(--text3);margin-top:4px">${esc(d.changelog)}</p>`:''}`;
      document.getElementById('doUpdateBtn').style.display='';
    }else{
      st.innerHTML=`<p style="font-size:13px;color:var(--green)">✅ 已是最新版本 (v${esc(d.current)})</p>`;
      document.getElementById('doUpdateBtn').style.display='none';
    }
  }catch(e){st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ 检查失败: ${esc(e.message)}</p>`}
}
async function fixUpdateSource(){
  const st=document.getElementById('updateStatus');
  st.innerHTML='<p style="font-size:13px;color:var(--orange)">⏳ 正在修复...</p>';
  try{
    const d=await apiPost('/update/fix-source');
    if(d.ok){toast('✅ '+d.message,'ok');checkUpdate()}
    else{st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ ${esc(d.error||d.message)}</p>`}
  }catch(e){st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ 修复失败: ${esc(e.message)}</p>`}
}

async function doUpdate(){
  if(!confirm('确定要更新到最新版本？更新完成后将自动重启服务。'))return;
  const st=document.getElementById('updateStatus');
  const btn=document.getElementById('doUpdateBtn');
  btn.disabled=true;btn.textContent='⏳ 更新中...';
  st.innerHTML='<p style="font-size:13px;color:var(--orange)">⏳ 正在下载更新...</p>';
  try{
    const d=await apiPost('/update/run');
    if(!d.ok){st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ ${esc(d.error)}</p>`;btn.disabled=false;btn.textContent='⬇️ 立即更新';return}
    let msg=`<p style="font-size:13px;color:var(--green)">✅ 已更新到 v${esc(d.version||'?')}</p>`;
    if(d.steps) d.steps.forEach(s=>msg+=`<p style="font-size:11px;color:var(--text3)">  ${s.ok?'✅':'❌'} ${esc(s.step)}</p>`);
    if(d.need_restart){
      msg+=`<p style="font-size:13px;color:var(--orange);margin-top:8px">⚠️ 需要重启服务以应用更新</p>`;
      msg+=`<div class="row" style="gap:8px;margin-top:8px">
        <button class="btn acc" onclick="doRestart()">🔄 立即重启</button>
        <span style="font-size:11px;color:var(--text3)">重启后约5秒自动刷新页面</span>
      </div>`;
    }
    st.innerHTML=msg;
    btn.style.display='none';
  }catch(e){st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ 更新失败: ${esc(e.message)}</p>`;btn.disabled=false;btn.textContent='⬇️ 立即更新'}
}

async function repairUpdate(){
  if(!confirm('一键修复将使用 git pull 或 curl/wget 下载最新代码并覆盖更新。\n\n适用于：自动更新报错无法使用的情况。\n更新完成后需重启服务。\n\n确定继续？'))return;
  const st=document.getElementById('updateStatus');
  st.innerHTML='<p style="font-size:13px;color:var(--orange)">🔧 正在修复更新...</p>';
  try{
    const d=await apiPost('/update/repair');
    if(!d.ok){st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ ${esc(d.error)}</p>`;return}
    let msg=`<p style="font-size:13px;color:var(--green)">✅ 修复成功</p>`;
    if(d.steps) d.steps.forEach(s=>msg+=`<p style="font-size:11px;color:var(--text3)">  ${s.ok?'✅':'❌'} ${esc(s.step)}${s.detail?': '+esc(s.detail):''}</p>`);
    if(d.need_restart){
      msg+=`<p style="font-size:13px;color:var(--orange);margin-top:8px">⚠️ 需要重启服务以应用修复</p>`;
      msg+=`<div class="row" style="gap:8px;margin-top:8px">
        <button class="btn acc" onclick="doRestart()">🔄 立即重启</button>
        <span style="font-size:11px;color:var(--text3)">重启后约5秒自动刷新页面</span>
      </div>`;
    }
    st.innerHTML=msg;
  }catch(e){st.innerHTML=`<p style="font-size:13px;color:var(--red)">❌ 修复失败: ${esc(e.message)}</p>`}
}

async function saveOnboardKey(){
  const prov=document.getElementById('obProv').value;

  const msg=document.getElementById('obMsg');
  if(!key){msg.innerHTML='<span style="color:var(--red)">❌ 请输入 API Key</span>';return}

  const presets=window._apPresets||{};
  const preset=presets[prov]||{};
  const base=preset.base||'';
  const model=preset.model||'';
  try{

      msg.innerHTML='<span style="color:var(--green)">✅ 配置已保存！正在重启服务...</span>';
      setTimeout(async()=>{try{await apiPost('/update/restart',{})}catch(e){}setTimeout(()=>{location.reload()},2000)},1000);
    }else{
      msg.innerHTML='<span style="color:var(--red)">❌ '+esc(d.error||'保存失败')+'</span>';
    }
  }catch(e){msg.innerHTML='<span style="color:var(--red)">❌ 网络错误</span>'}

async function doRestart(){
  if(!confirm('确定立即重启服务？正在进行的任务将中断。'))return;
  const st=document.getElementById('updateStatus');
  if(st){
    st.innerHTML='<p style="font-size:13px;color:var(--orange)">🔄 正在重启...</p>';
  }
  try{await apiPost('/update/restart')}catch(e){/* expected - server dies */}
  if(st){
    st.innerHTML+='<p style="font-size:12px;color:var(--text2)">⏳ 等待服务恢复...</p>';
  }
  for(let i=0;i<30;i++){
    await new Promise(r=>setTimeout(r,1000));
    try{const r=await fetch('/api/dashboard');if(r.ok){window.location.reload();return}}catch(e){}
  }
  if(st){
    st.innerHTML='<p style="font-size:13px;color:var(--red)">❌ 重启超时，请手动重启 start.bat / start.command</p>';
  } else {
    window.location.reload();
  }
}

async function doStopServer(){
  if(!confirm('确定停止服务？停止后需手动运行 start.command / start.bat 重新启动。'))return;
  try{await apiPost('/update/stop')}catch(e){/* expected */}
  document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:var(--text);background:var(--bg)"><h2>🛑 服务已停止</h2><p style="color:var(--text2)">服务已安全停止。请双击 start.command (Mac) 或 start.bat (Windows) 重新启动。</p></div>`;
}

async function downloadCurrentChat(targetId){
  const paneIdx = targetId && targetId.startsWith('msgs') ? parseInt(targetId.replace('msgs',''))||0 : 0;
  const sid = paneIdx > 0 && _paneSids[paneIdx-1] ? _paneSids[paneIdx-1] : activeSid;
  const msgs = chatMsgs[sid]||[];
  if(!msgs.length){toast('无聊天记录可保存','err');return}
  // Build markdown text
  let text = '# GenericAgent Chat Session\n';
  text += '# Exported: '+new Date().toISOString()+'\n\n';
  msgs.forEach(m=>{
    text += '## '+(m.role==='user'?'👤 User':'🤖 Assistant')+' ['+(m.ts||'')+']\n';
    text += (m.content||'')+'\n\n';
  });
  const blob = new Blob([text],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

async function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.version) { toast('无效的备份文件', 'err'); return; }

      let restored = [];

      // Restore sessions (chat history + working memory)
      if (backup.sessions && backup.sessions.length) {
        const d = await apiPost('/backup/restore', { sessions: backup.sessions });
        if (d.restored) restored.push(`${d.restored} 个会话`);
      }

      // Restore group chat agents
      if (backup.groupchat_agents && backup.groupchat_agents.length) {
        await apiPost('/groupchat/agents/save', { agents: backup.groupchat_agents });
        gcAgents = backup.groupchat_agents;
        restored.push(`${backup.groupchat_agents.length} 个群聊Agent`);
      }

      // Restore skills
      if (backup.skills && backup.skills.length) {
        await apiPost('/skills/save', { skills: backup.skills });
        restored.push(`${backup.skills.length} 个技能`);
      }

      // Restore tasks
      if (backup.tasks && backup.tasks.length) {
        await apiPost('/tasks/restore', { tasks: backup.tasks }).catch(()=>{});
        restored.push(`${backup.tasks.length} 个任务`);
      }

      // Restore memory
      if (backup.memory && backup.memory.length) {
        await apiPost('/memory/save', { memories: backup.memory }).catch(()=>{});
        restored.push(`${backup.memory.length} 条记忆`);
      }

      // Restore custom models
      if (backup.custom_models && backup.custom_models.length) {
        await apiPost('/models/custom/restore', { models: backup.custom_models }).catch(()=>{});
        restored.push(`${backup.custom_models.length} 个自定义模型`);
      }

      // Restore language
      if (backup.language) {
        await apiPost('/language', { language: backup.language }).catch(()=>{});
      }

      // Restore settings
      if (backup.settings) {
        const s = backup.settings;
        if (s.theme) { localStorage.setItem('hermes-theme', s.theme); document.documentElement.setAttribute('data-theme', s.theme); }
        if (s.font_size) { setFontSize(s.font_size); }
        if (s.dev_mode === 'true') { document.body.classList.add('dev-mode'); localStorage.setItem('hermes-dev-mode', 'true'); }
        if (s.sidebar_collapsed === 'true') { document.getElementById('sb').classList.add('collapsed'); localStorage.setItem('hermes-sidebar-collapsed', 'true'); }
      }

      buildNav();
      if (cur === 'chat') { await loadSessions(); renderChatView(); }
      if (cur === 'groupchat') renderGroupchat();
      updateThemeBtn();
      toast(`✅ 备份恢复成功！${restored.length ? ' ('+restored.join('、')+')' : ''}`, 'ok');
    } catch(e) {
      toast('导入失败: ' + e.message, 'err');
    }
  };
  input.click();
}

// ── Drag (using right/bottom, no left/top switch) ──
let _dragMoved=false, _dragStartMX=0, _dragStartMY=0;
let _dragStartRight=0, _dragStartBottom=0;
pet.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const r=pet.getBoundingClientRect();
  isDrag=true; _dragMoved=false;
  _dragStartMX = e.clientX;
  _dragStartMY = e.clientY;
  _dragStartRight = window.innerWidth - r.right;
  _dragStartBottom = window.innerHeight - r.bottom;
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  const dx=e.clientX-_dragStartMX, dy=e.clientY-_dragStartMY;
  if(!_dragMoved){
    if(Math.abs(dx)<4 && Math.abs(dy)<4)return;
    _dragMoved=true; pet.classList.add('dragging');
  }
  // Moving right decreases right, moving down decreases bottom
  pet.style.right = (_dragStartRight - dx) + 'px';
  pet.style.bottom = (_dragStartBottom - dy) + 'px';
});
document.addEventListener('mouseup',()=>{
  if(!isDrag)return;
  isDrag=false; pet.classList.remove('dragging');
});

  '🎵 科目三来一段？','🐴 马看到什么，是ruen决定的','🤣 笑不活了','🤷 啊对对对~',
  '💃 都在跳这个','🍉 吃瓜前线','🤌 你没事吧~','🎬 这个好上头','🚩 立个flag',
  '🤖 AI说这样不行','😱 还有这种操作','💪 卷起来了','🤪 精神状态美丽',
  '🫠 i人狂喜','🤯 这知识不进脑子','🫡 收到，马上执行','🎯 精准捕捉',
];
let _douyinIdx=0;
function _sayRandomDouyin(){
  if(!petVisible||pet.classList.contains('thinking')||isPlaying)return;
  if(Math.random()<.12){
    _douyinIdx=(_douyinIdx+Math.floor(Math.random()*(DOUYIN_MEMES.length-1))+1)%DOUYIN_MEMES.length;
    say(DOUYIN_MEMES[_douyinIdx],3500);
  }
}
// Mix douyin into random idle (every 25s, 12% chance)
setInterval(_sayRandomDouyin,25000);

// ── Idle random say (mix with douyin, reduced chance) ──
setInterval(()=>{
  if(!petVisible||pet.classList.contains('thinking')||isPlaying)return;
  if(Math.random()<.08){
    const bmsgs=_getBondMsgs();
    say(bmsgs[Math.floor(Math.random()*bmsgs.length)]);
  }
},30000);

// ── Morning news ──
let _newsTime='08:00';
let _lastNewsDate='';
function _checkMorningNews(){
  const d=new Date();
  const today=d.toISOString().slice(0,10);
  const hm=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  const [th,tm]=_newsTime.split(':').map(Number);
  if(today===_lastNewsDate)return;
  if(d.getHours()!==th||Math.abs(d.getMinutes()-tm)>2)return;
  _lastNewsDate=today;
  say('☀️ 早上好！为你播报今日快讯…',4000);
  // Try to get headlines from a simple fetch
  setTimeout(async ()=>{
    try{
      const r=await fetch('https://news.ycombinator.com/newest');
      if(r.ok){
        const txt=await r.text();
        const titles=[...txt.matchAll(/class="titleline"><a[^>]*>([^<]+)</g)].slice(0,5);
        if(titles.length){
          const headlines=titles.map((m,i)=>`${i+1}. ${m[1]}`).join(' · ');
          say('📰 '+headlines,8000);
        }else{
          say('📰 今日适宜：专注工作，善用AI助手~',4000);
        }
      }
    }catch(e){
      say('📰 今日适宜：专注工作，善用AI助手~',4000);
    }
  },4500);
}
setInterval(_checkMorningNews,60000);
_checkMorningNews();
// Store news time setting
window.setNewsTime=function(t){
  _newsTime=t;
  _lastNewsDate=''; // allow re-trigger today
  localStorage.setItem('hermes-news-time',t);
  say('⏰ 早报时间设为 '+t,2000);
};
window.getNewsTime=()=>_newsTime;
try{const st=localStorage.getItem('hermes-news-time');if(st)_newsTime=st}catch(e){}

// ── Sleepy at night ──
function updateSleepy(){
  const h=new Date().getHours();
  pet.classList.toggle('sleepy',h>=23||h<6);
}
updateSleepy();setInterval(updateSleepy,600000);

// ── Toggle visibility ──
window.togglePet=function(){
  petVisible=!petVisible;
  pet.style.display=petVisible?'':'none';
  toggle.textContent=petVisible?'🐾':'👣';
  toggle.title=petVisible?'隐藏宠物':'显示宠物';
};

// ── Expose for settings ──
window.getPetType=()=>petType;
window.getPetIcons=()=>PET_ICONS;
window.getPetNames=()=>PET_NAMES;
window.setPetType=function(t){
  setPetType(t);
  if(t===0) PET_ICONS[0]='🔵';
  say(PET_ICONS[t]+' '+PET_NAMES[t]+'来啦~',2000);
  spawnParticles('✨',4);
};
})();
</script>
